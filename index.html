const CLUE_TYPES = [
  { key: 'continent', icon: '🗺️', label: 'Continent' },
  { key: 'population', icon: '👥', label: 'Population' },
  { key: 'language', icon: '🗣️', label: 'Official Language' },
  { key: 'neighbours', icon: '🤝', label: 'Borders' },
  { key: 'capital', icon: '🏛️', label: 'Capital City' },
  { key: 'currency', icon: '💰', label: 'Currency' },
  { key: 'hint', icon: '💡', label: 'Hint' },
];

let countryState = { score: 0, total: 0, seenCountries: new Set() };
let _countryInputMode = 'multi';

function startCountryGame(inputMode) {
  inputMode = inputMode || 'multi';
  _countryInputMode = inputMode;
  stopSpeech();
  appMode = 'play';
  gameMode = inputMode === 'type' ? 'country-type' : 'country-multi';
  updateToggleBar();
  renderCountryRound();
}

function renderCountryRound() {
  const isTyped = _countryInputMode === 'type';

  const pool = COUNTRIES.filter(c => !countryState.seenCountries.has(c.name));
  if (pool.length < 4) { countryState.seenCountries.clear(); }
  const refreshed = COUNTRIES.filter(c => !countryState.seenCountries.has(c.name));

  const correct = refreshed[Math.floor(Math.random() * refreshed.length)];
  countryState.seenCountries.add(correct.name);

  const others = COUNTRIES
    .filter(c => c.name !== correct.name)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3);

  const options = shuffle([correct, ...others]);
  const CLUE_ORDER = ['continent','population','neighbours','hint','capital','language','currency'];
  const allClues = [...CLUE_TYPES].sort((a, b) =>
    CLUE_ORDER.indexOf(a.key) - CLUE_ORDER.indexOf(b.key)
  );
  let shownClues = 2;
  let guesses = 0;
  let solved = false;
  const eliminated = new Set();

  function renderCountryCard() {
    const cluesHtml = allClues.slice(0, shownClues).map(ct => {
      const raw = correct[ct.key];
      const name = correct.name;
      const words = name.split(/[\s\-]+/).filter(w => w.length >= 4);
      let sanitised = raw;
      sanitised = sanitised.replace(new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), '▓▓▓▓▓');
      words.forEach(w => {
        sanitised = sanitised.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), '▓▓▓▓▓');
      });
      return `
      <div class="country-clue">
        <span class="clue-icon">${ct.icon}</span>
        <span class="clue-text">
          <span class="clue-label">${ct.label}</span>
          ${escHtml(sanitised)}
        </span>
      </div>`;
    }).join('');

    const canRevealMore = shownClues < allClues.length && !solved;
    const guessLabel = guesses === 0 ? 'First try!' : guesses === 1 ? '2nd guess' : `${guesses + 1} guesses`;

    // Build answer section depending on mode
    let answerHtml = '';
    if (!solved) {
      if (isTyped) {
        answerHtml = `
          <div class="flag-type-form">
            <input class="flag-type-input" id="countryTypeInput" type="text"
              placeholder="Type country name…" autocomplete="off" autocorrect="off" spellcheck="false"
              onkeydown="if(event.key==='Enter')submitCountryType()">
            <button class="flag-type-submit" onclick="submitCountryType()">Submit</button>
          </div>
          <div class="flag-type-hint" id="countryTypeHint" style="padding:0 24px 12px">
            ${guesses > 0 ? `${guesses} wrong guess${guesses > 1 ? 'es' : ''} so far — keep trying` : 'Press Enter or tap Submit'}
          </div>`;
      } else {
        answerHtml = `
          <div class="country-options" id="countryOptions">
            ${options.map(o => {
              const isEliminated = eliminated.has(o.name);
              return `<button class="country-option${isEliminated ? ' wrong' : ''}"
                onclick="answerCountry('${escAttr(o.name)}','${escAttr(correct.name)}',this)"
                ${isEliminated ? 'disabled' : ''}>
                ${o.flag} ${escHtml(o.name)}
              </button>`;
            }).join('')}
          </div>`;
      }
    }

    document.getElementById('cardArea').innerHTML = `
      <div class="country-card">
        <div class="country-header">
          <h2>🌍 Name this country</h2>
          <span class="country-clue-count">${shownClues} of ${allClues.length} clues</span>
        </div>
        <div class="country-clues">${cluesHtml}</div>
        ${canRevealMore ? `<button class="country-next-clue" onclick="revealClue()">+ Reveal another clue</button>` : ''}
        ${answerHtml}
        ${solved ? `
          <div style="padding:12px 24px 8px;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700">${correct.flag} ${escHtml(correct.name)}</div>
          <div style="padding:0 24px 16px;font-size:0.85rem;color:var(--muted);line-height:1.6">${escHtml(correct.hint)}</div>
          <div style="padding:0 24px 16px;font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--accent2)">${guessLabel} — ${countryState.score} pts from ${countryState.total} round${countryState.total !== 1 ? 's' : ''}</div>
        ` : `<div class="country-score">${countryState.score} pts · ${countryState.total} round${countryState.total !== 1 ? 's' : ''}${!isTyped && guesses > 0 ? ` · ${guesses} wrong guess${guesses > 1 ? 'es' : ''} so far` : ''}</div>`}
      </div>
      <div class="nav-controls" style="margin-top:16px">
        ${solved ? `<button class="btn-next" onclick="renderCountryRound()" style="flex:1">Next country →</button>` : ''}
        <button class="btn-next" onclick="setDomain('random')" style="flex:0;padding:14px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);">✕</button>
      </div>`;

    document.getElementById('statsStrip').style.display = 'none';
    document.getElementById('milestoneArea').innerHTML = '';

    // Auto-focus the input in typed mode
    if (isTyped && !solved) setTimeout(() => document.getElementById('countryTypeInput')?.focus(), 80);
  }

  window.revealClue = function() {
    if (shownClues < allClues.length) { shownClues++; renderCountryCard(); }
  };

  // Multiple choice answer handler
  window.answerCountry = function(chosen, correct_name, btn) {
    if (chosen === correct_name) {
      solved = true;
      countryState.total++;
      countryState.score += Math.max(1, 4 - guesses);
      btn.classList.add('correct');
      showToast(guesses === 0 ? '🏆 First try!' : guesses === 1 ? '✓ Got it in 2!' : `✓ Got it in ${guesses + 1}!`);
      shownClues = allClues.length;
      renderCountryCard();
    } else {
      guesses++;
      eliminated.add(chosen);
      btn.classList.add('wrong');
      btn.disabled = true;
      showToast('✗ Not quite — here\'s another clue');
      if (shownClues < allClues.length) shownClues++;
      setTimeout(() => renderCountryCard(), 600);
    }
  };

  // Typed answer handler
  window.submitCountryType = function() {
    const input = document.getElementById('countryTypeInput');
    const hint  = document.getElementById('countryTypeHint');
    if (!input) return;
    const val = input.value.trim();
    if (!val) return;

    if (flagTypedMatch(val, correct.name)) {
      // Correct
      solved = true;
      countryState.total++;
      countryState.score += Math.max(1, 4 - guesses);
      input.classList.add('correct');
      input.disabled = true;
      shownClues = allClues.length;
      showToast(guesses === 0 ? '🏆 First try!' : `✓ Got it in ${guesses + 1}!`);
      renderCountryCard();
    } else {
      // Wrong — shake input, reveal a clue, keep going
      guesses++;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => { input.classList.remove('wrong'); input.focus(); }, 600);
      showToast('✗ Not quite — here\'s another clue');
      if (shownClues < allClues.length) shownClues++;
      setTimeout(() => renderCountryCard(), 650);
    }
  };

  renderCountryCard();
}


// ── LOGO GAME STATE ──
let logoState = { score: 0, total: 0, seenLogos: new Set() };
let _logoTier = 'easy'; // 'easy' | 'hard' | 'all'

function startLogoGame(tier) {
  _logoTier = tier || 'easy';
  stopSpeech();
  appMode = 'play';
  gameMode = 'logo-' + _logoTier;
  updateToggleBar();
  renderLogoRound();
}

function logoFallback(name, category, blurCls) {
  const colors = {
    'Technology':'#4A90D9','Food & Drink':'#E8734A','Automotive':'#2C7873',
    'Fashion':'#9B59B6','Finance':'#27AE60','Media':'#E74C3C','Other':'#8E8E93'
  };
  const bg = colors[category] || '#8E8E93';
  const letter = name[0].toUpperCase();
  const blur = blurCls === 'blurred-3' ? 'filter:blur(18px)' :
               blurCls === 'blurred-2' ? 'filter:blur(12px)' :
               blurCls === 'blurred-1' ? 'filter:blur(6px)' : '';
  return `<div id="logoImg" style="width:160px;height:160px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:72px;font-weight:700;color:white;font-family:'Playfair Display',serif;${blur};transition:filter 0.5s ease">${letter}</div>`;
}


function renderLogoRound() {
  const tierFilter = _logoTier === 'all' ? [1,2] : _logoTier === 'hard' ? [2] : [1];
  const pool = LOGO_BRANDS.filter(b => tierFilter.includes(b.tier) && !logoState.seenLogos.has(b.name));
  if (pool.length < 1) { logoState.seenLogos.clear(); renderLogoRound(); return; }
  const brand = pool[Math.floor(Math.random() * pool.length)];
  logoState.seenLogos.add(brand.name);

  let hintsUsed = 0;  // 0=none, 1=category, 2=letters, 3=unblur
  let attempts = 0;
  let solved = false;

  function blurClass() {
    if (solved) return 'revealed';
    if (hintsUsed >= 3) return 'blurred-1';
    if (hintsUsed === 2) return 'blurred-2';
    return 'blurred-3';
  }

  function letterHint() {
    // Show first letter + blanks for rest: A _ _ _ _
    const words = brand.name.split(' ');
    return words.map(w => w[0].toUpperCase() + ' ' + Array(w.length-1).fill('_').join(' ')).join('   ');
  }

  function render() {
    const imgUrl = `https://logo.clearbit.com/${brand.domain}?size=200`;
    const pts = Math.max(1, 3 - hintsUsed);
    const hintChips = [
      { label: '🏷 Category', key: 'cat', used: hintsUsed >= 1 },
      { label: '🔤 Letters',  key: 'let', used: hintsUsed >= 2 },
      { label: '👁 Reveal',   key: 'vis', used: hintsUsed >= 3 },
    ];

    let hintRevealHtml = '';
    if (hintsUsed >= 1) hintRevealHtml += `<span class="hint-cat">${brand.category}</span>`;
    if (hintsUsed >= 2) hintRevealHtml += `&nbsp;&nbsp;<span class="hint-letters">${letterHint()}</span>`;

    const solvedHtml = solved ? `
      <div class="logo-reveal-block">
        <div class="logo-reveal-name">${escHtml(brand.name)}</div>
        <div class="logo-reveal-hint">${escHtml(brand.hint)}</div>
        <div class="logo-reveal-meta">
          +${pts} pt${pts!==1?'s':''} &nbsp;·&nbsp; ${logoState.score} pts from ${logoState.total} round${logoState.total!==1?'s':''} &nbsp;·&nbsp; <a href="${brand.wiki}" target="_blank" style="color:var(--accent2)">Wikipedia ↗</a>
        </div>
      </div>` : '';

    const inputHtml = solved ? '' : `
      <div class="logo-type-form">
        <input class="logo-type-input" id="logoTypeInput" type="text"
          placeholder="Brand name…" autocomplete="off" autocorrect="off" spellcheck="false"
          onkeydown="if(event.key==='Enter')submitLogo()">
        <button class="logo-type-submit" onclick="submitLogo()">→</button>
      </div>
      <div class="logo-feedback" id="logoFeedback"></div>`;

    document.getElementById('cardArea').innerHTML = `
      <div class="logo-card">
        <div class="logo-header"><h2>🏷️ Logo Game — Name this brand</h2></div>
        <div cla          <img class="logo-img ${blurClass()}" id="logoImg"
            src="${imgUrl}"
            alt="Brand logo"
            data-name="${escAttr(brand.name)}"
            data-cat="${escAttr(brand.category)}"
            data-blur="${blurClass()}"
            onerror="var el=this;el.parentElement.innerHTML=logoFallback(el.dataset.name,el.dataset.cat,el.dataset.blur)">
        </div>
        <div class="logo-hints-row" id="logoHintsRow">
          ${hintChips.map(h => `<button class="logo-hint-chip${h.used?' used':''}" onclick="useLogoHint('${h.key}')" ${h.used?'disabled':''}>${h.label}</button>`).join('')}
        </div>
        <div class="logo-hint-reveal" id="logoHintReveal">${hintRevealHtml}</div>
        ${inputHtml}
        ${solvedHtml}
        ${!solved ? `<div class="logo-score">${logoState.score} pts · ${logoState.total} round${logoState.total!==1?'s':''} · ${pts} pts available</div>` : ''}
      </div>
      <div class="nav-controls" style="margin-top:16px">
        ${solved ? `<button class="btn-next" onclick="renderLogoRound()" style="flex:1">Next brand →</button>` : ''}
        <button class="btn-next" onclick="setDomain('random')" style="flex:0;padding:14px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);">✕</button>
      </div>`;

    document.getElementById('statsStrip').style.display = 'none';
    document.getElementById('milestoneArea').innerHTML = '';
    if (!solved) setTimeout(() => document.getElementById('logoTypeInput')?.focus(), 80);
  }

  window.useLogoHint = function(key) {
    if (solved) return;
    if (key === 'cat' && hintsUsed < 1) hintsUsed = 1;
    else if (key === 'let' && hintsUsed < 2) hintsUsed = 2;
    else if (key === 'vis' && hintsUsed < 3) hintsUsed = 3;
    render();
    setTimeout(() => document.getElementById('logoTypeInput')?.focus(), 80);
  };

  window.submitLogo = function() {
    if (solved) return;
    const input = document.getElementById('logoTypeInput');
    const feedback = document.getElementById('logoFeedback');
    if (!input) return;
    const val = input.value.trim();
    if (!val) return;

    const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
    const inp = norm(val);
    const cor = norm(brand.name);
    const aliases = (brand.aliases || []).map(a => norm(a));

    // Match: exact, alias, or Levenshtein ≤2
    const isRight = inp === cor || aliases.includes(inp) ||
      levenshtein(inp, cor) <= (cor.length > 8 ? 2 : 1);

    if (isRight) {
      solved = true;
      attempts++;
      const pts = Math.max(1, 3 - hintsUsed);
      logoState.total++;
      logoState.score += pts;
      hintsUsed = 99; // force reveal
      showToast(hintsUsed <= 1 ? '🏆 Nailed it!' : pts === 2 ? '✓ Nice!' : '✓ Got it!');
      render();
    } else {
      attempts++;
      // Auto-reveal next hint tier on wrong answer
      if (hintsUsed < 3) hintsUsed++;
      feedback.textContent = attempts === 1 ? 'Not quite — a hint has been revealed' :
        attempts === 2 ? 'Try again — another hint unlocked' : 'Keep going…';
      feedback.className = 'logo-feedback wrong';
      input.value = '';
      // Update blur on image
      const img = document.getElementById('logoImg');
      if (img) img.className = `logo-img ${blurClass()}`;
      // Update hints row
      const hintChips = document.querySelectorAll('.logo-hint-chip');
      if (hintChips.length >= hintsUsed) {
        for (let i = 0; i < hintsUsed; i++) hintChips[i].classList.add('used');
      }
      // Update hint reveal
      let hintRevealHtml = '';
      if (hintsUsed >= 1) hintRevealHtml += `<span class="hint-cat">${brand.category}</span>`;
      if (hintsUsed >= 2) hintRevealHtml += `&nbsp;&nbsp;<span class="hint-letters">${letterHint()}</span>`;
      const hr = document.getElementById('logoHintReveal');
      if (hr) hr.innerHTML = hintRevealHtml;
    }
  };

  render();
}







// ─── Search Mode ──────────────────────────────────────────────────────────────

let searchMode = false;
let searchTopic = '';        // current locked topic e.g. "Spain"
let searchPool = [];         // fetched article summaries for this topic
let searchPoolIndex = 0;     // which article in pool we're on
let searchDebounce = null;

function toggleSearchMode() {
  if (searchMode) {
    exitSearchMode();
  } else {
    enterSearchMode();
  }
}

function enterSearchMode() {
  searchMode = true;
  searchTopic = '';
  searchPool = [];
  searchPoolIndex = 0;

  // UI: activate search pill, show search bar, hide card area
  document.querySelectorAll('.domain-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('searchPill').classList.add('active');
  document.getElementById('searchBar').style.display = 'block';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('cardArea').innerHTML = `
    <div style="text-align:center; padding:60px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:0.9rem;">
      Search a topic above to begin
    </div>`;

  // Focus the input
  setTimeout(() => {
    const inp = document.getElementById('searchInput');
    if (inp) { inp.value = ''; inp.focus(); }
  }, 100);
}

function exitSearchMode() {
  searchMode = false;
  searchTopic = '';
  searchPool = [];
  document.getElementById('searchBar').style.display = 'none';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchPill').classList.remove('active');
  // restore previously active domain pill
  document.querySelectorAll('.domain-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.domain === state.domain);
  });
  loadCard();
}

function onSearchInput(val) {
  clearTimeout(searchDebounce);
  if (!val.trim()) {
    document.getElementById('searchResults').style.display = 'none';
    return;
  }
  searchDebounce = setTimeout(() => runSearch(val), 500);
}

async function runSearch(query) {
  query = (query || '').trim();
  if (!query) return;

  const resultsEl = document.getElementById('searchResults');
  const innerEl = document.getElementById('searchResultsInner');
  resultsEl.style.display = 'block';
  innerEl.innerHTML = '<div class="search-loading">Searching Wikipedia…</div>';

  try {
    // Step 1: get list of matching article titles
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=16&srprop=snippet`;
    const r = await fetch(searchUrl);
    const d = await r.json();
    const hits = d.query?.search || [];

    if (!hits.length) {
      innerEl.innerHTML = '<div class="search-loading">No results found. Try a different topic.</div>';
      return;
    }

    // Step 2: fetch summaries (with thumbnails) for top 10
    const titles = hits.slice(0, 10).map(h => h.title);
    const summaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(titles[0])}`;

    // Fetch all summaries in parallel
    const summaries = await Promise.all(
      titles.map(t =>
        fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      )
    );

    const valid = summaries.filter(s => s && s.extract && s.extract.length > 80);

    if (!valid.length) {
      innerEl.innerHTML = '<div class="search-loading">No readable articles found. Try another topic.</div>';
      return;
    }

    // Store as pool for swipe-through after selection
    searchPool = valid;
    searchPoolIndex = 0;
    searchTopic = query;

    // Step 3: render result grid
    innerEl.innerHTML = valid.map((s, i) => `
      <div class="search-result-card" onclick="pickSearchResult(${i})">
        ${s.thumbnail ? `<img class="search-result-thumb" src="${s.thumbnail.source}" onerror="this.style.display='none'">` : ''}
        <div class="search-result-title">${escHtml(s.title)}</div>
        <div class="search-result-desc">${escHtml((s.extract || '').slice(0, 120))}…</div>
      </div>
    `).join('');

  } catch(e) {
    innerEl.innerHTML = '<div class="search-loading">Search failed. Check your connection.</div>';
  }
}

function pickSearchResult(index) {
  // Hide the results grid, load that article as first card
  document.getElementById('searchResults').style.display = 'none';
  searchPoolIndex = index;
  loadSearchCard();
}

async function loadSearchCard() {
  if (!searchPool.length) { loadCard(); return; }

  // Show skeleton while we prep
  showSkeleton();

  // Get current article from pool
  const article = searchPool[searchPoolIndex];

  // Mark as seen
  state.seenTitles.add(article.title);

  // Process and render it
  const card = processArticle(article, searchTopic);
  state.currentCard = card;
  state.seen.push(card);
  if (state.seen.length > 60) state.seen.shift();
  state.cardCount++;
  renderCard(card);

  // Advance pool index — wrap around, skip seen
  let next = (searchPoolIndex + 1) % searchPool.length;
  // if we've seen all pool articles, silently fetch more
  const allSeen = searchPool.every(a => state.seenTitles.has(a.title));
  if (allSeen) {
    fetchMoreSearchResults(searchTopic);
  }
  searchPoolIndex = next;
}

async function fetchMoreSearchResults(query) {
  // Fetch a fresh batch with an offset to get different results
  try {
    const offset = searchPool.length;
    const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=10&sroffset=${offset}&srprop=snippet`;
    const r = await fetch(url);
    const d = await r.json();
    const hits = (d.query?.search || []).map(h => h.title);
    const summaries = await Promise.all(
      hits.map(t =>
        fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`)
          .then(r => r.ok ? r.json() : null).catch(() => null)
      )
    );
    const fresh = summaries.filter(s => s && s.extract && s.extract.length > 80 && !state.seenTitles.has(s.title));
    if (fresh.length) {
      searchPool.push(...fresh);
      // reset seen flags for this pool so we can keep swiping
      searchPool.forEach(a => state.seenTitles.delete(a.title));
    }
  } catch(e) {}
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
// Restore domain pill
document.querySelectorAll('.domain-pill').forEach(p => {
  p.classList.toggle('active', p.dataset.domain === state.domain);
});

// Show splash screen on every launch — user picks Learn or Play first
// (card area and domain bar stay hidden until confirmed)
document.getElementById('domainBar').style.display = 'none';
document.getElementById('statsStrip').style.display = 'none';

// Keyboard: space/arrow for next
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowRight') {
    if (appMode !== 'learn') return;
    if (!document.querySelector('.quiz-overlay[style*="flex"]')) {
      e.preventDefault();
      nextCard();
    }
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Curio SW registered:', reg.scope))
      .catch(err => console.warn('Curio SW registration failed:', err));
  });
}
