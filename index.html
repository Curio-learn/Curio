<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Curio — Learn Something New</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Curio">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Theme colour (colours browser chrome on Android) -->
<meta name="theme-color" content="#1a1410">

<!-- General meta -->
<meta name="description" content="Discover random knowledge, one card at a time.">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --cream: #ede8da;
    --accent: #c0392b;
    --accent2: #2c7873;
    --gold: #b8860b;
    --muted: #8a7f72;
    --card-bg: #faf8f3;
    --border: rgba(26,20,16,0.12);
    --shadow: 0 2px 24px rgba(26,20,16,0.1), 0 1px 4px rgba(26,20,16,0.08);
    /* Safe areas for iPhone notch / Dynamic Island / home bar */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(20px + var(--safe-top)) 32px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .streak-badge .count {
    color: var(--gold);
    font-weight: 500;
  }

  /* Domain filter pills */
  .domain-bar {
    display: flex;
    gap: 8px;
    padding: 14px 32px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
    scrollbar-width: none;
  }

  .domain-bar::-webkit-scrollbar { display: none; }

  .domain-pill {
    white-space: nowrap;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .domain-pill:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .search-pill { gap: 6px; }
  .search-pill.active { background: var(--accent2) !important; color: #fff !important; border-color: var(--accent2) !important; }

  .search-result-card {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .search-result-card:hover {
    border-color: var(--accent2);
    transform: translateY(-1px);
  }
  .search-result-thumb {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 6px;
    background: var(--border);
  }
  .search-result-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .search-result-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-topic-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .search-loading {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  .domain-pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }

  /* Main layout */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px calc(80px + var(--safe-bottom));
  }

  /* Card */
  .card-container {
    perspective: 1200px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: cardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin: center top;
    position: relative;
    touch-action: pan-y; /* allow vertical scroll, let JS handle horizontal */
    user-select: none;
    -webkit-user-select: none;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes cardOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-12px) scale(0.97); }
  }

  .card.leaving {
    animation: cardOut 0.2s ease forwards;
  }

  .card-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
  }

  .card-image-placeholder {
    width: 100%;
    height: 180px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    opacity: 0.4;
  }

  .card-body {
    padding: 32px 36px 28px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-domain {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 2px 9px;
    border-radius: 2px;
  }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-left: auto;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .card-summary {
    font-size: 0.97rem;
    line-height: 1.75;
    color: #3d3530;
    font-weight: 300;
  }

  .card-summary.truncated {
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 18px 36px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .read-more-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--border);
    transition: color 0.15s;
    letter-spacing: 0.02em;
    padding: 0;
  }

  .read-more-btn:hover { color: var(--ink); }

  .wiki-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }

  .wiki-link:hover { opacity: 0.7; }

  /* Navigation */
  .nav-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    gap: 12px;
  }

  .btn-next {
    flex: 1;
    padding: 14px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-next:hover {
    background: #2d2520;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(26,20,16,0.2);
  }

  .btn-next:active { transform: translateY(0); }

  .btn-save {
    padding: 14px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.18s;
    color: var(--muted);
  }

  .btn-save:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,134,11,0.06);
  }

  .btn-save.saved {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,134,11,0.08);
  }

  /* Stats strip */
  .stats-strip {
    display: flex;
    gap: 0;
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    background: var(--card-bg);
  }

  .stat-cell {
    flex: 1;
    padding: 12px 16px;
    text-align: center;
    border-right: 1px solid var(--border);
  }

  .stat-cell:last-child { border-right: none; }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--ink);
    display: block;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }

  /* Quiz overlay */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .quiz-panel {
    background: var(--card-bg);
    border-radius: 4px;
    max-width: 580px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: panelIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes panelIn {
    from { transform: translateY(30px) scale(0.97); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .quiz-header {
    background: var(--ink);
    color: var(--paper);
    padding: 22px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .quiz-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .quiz-header .quiz-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 0.06em;
  }

  .quiz-body {
    padding: 28px;
  }

  .quiz-q-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .quiz-question {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 400;
  }

  .quiz-clue {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 22px;
    padding: 16px 20px;
    background: var(--cream);
    border-left: 3px solid var(--gold);
    border-radius: 0 3px 3px 0;
  }

  .quiz-clue-blank {
    border-left-color: var(--accent2);
  }

  .blank-slot {
    display: inline-block;
    color: var(--accent2);
    font-weight: 700;
    font-style: normal;
    letter-spacing: 0.08em;
    border-bottom: 2px solid var(--accent2);
    padding-bottom: 1px;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .quiz-option {
    padding: 13px 18px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.9rem;
    text-align: left;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    color: var(--ink);
    line-height: 1.4;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--cream);
  }

  .quiz-option.correct {
    border-color: var(--accent2);
    background: rgba(44,120,115,0.08);
    color: var(--accent2);
  }

  .quiz-option.wrong {
    border-color: var(--accent);
    background: rgba(192,57,43,0.07);
    color: var(--accent);
  }

  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 3px;
    font-size: 0.88rem;
    line-height: 1.5;
    display: none;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb {
    background: rgba(44,120,115,0.1);
    color: var(--accent2);
    border: 1px solid rgba(44,120,115,0.2);
  }
  .quiz-feedback.wrong-fb {
    background: rgba(192,57,43,0.07);
    color: var(--accent);
    border: 1px solid rgba(192,57,43,0.15);
  }

  .quiz-nav {
    padding: 18px 28px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .btn-quiz-skip {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-quiz-skip:hover { color: var(--ink); border-color: var(--ink); }

  .btn-quiz-next {
    padding: 10px 22px;
    background: var(--ink);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--paper);
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-quiz-next:hover { background: #2d2520; }

  /* Quiz score screen */
  .quiz-score-body {
    padding: 36px 28px;
    text-align: center;
  }

  .score-ring {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    position: relative;
  }

  .quiz-score-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 8px;
  }

  .quiz-score-sub {
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 22px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    letter-spacing: 0.02em;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Loading skeleton */
  .skeleton-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .skel {
    background: linear-gradient(90deg, var(--cream) 25%, var(--paper) 50%, var(--cream) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-image { height: 180px; width: 100%; border-radius: 0; }
  .skel-line { height: 14px; margin-bottom: 10px; }
  .skel-title { height: 32px; width: 75%; margin-bottom: 16px; }
  .skel-text { height: 12px; }
  .skel-body { padding: 32px 36px; }

  /* Error state */
  .error-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .error-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .error-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 8px; }
  .error-sub { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

  /* Quiz milestone banner */
  .milestone-banner {
    background: linear-gradient(135deg, var(--ink), #2d2520);
    color: var(--paper);
    padding: 16px 24px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 20px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .milestone-banner:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
  .milestone-icon { font-size: 1.8rem; }
  .milestone-text { flex: 1; }
  .milestone-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
  .milestone-sub { font-size: 0.78rem; opacity: 0.7; margin-top: 2px; font-weight: 300; }
  .milestone-arrow { font-size: 1.2rem; opacity: 0.6; }

  /* Saved panel toggle */
  .saved-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .saved-toggle:hover { color: var(--ink); border-color: var(--ink); }

  /* Mode button in header */
  .btn-mode-switch {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 3px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-mode-switch:hover { opacity: 0.8; }
  .btn-mode-switch .mode-label { font-weight: 500; }

  /* Full-screen mode splash (shown on first load) */
  .mode-splash {
    position: fixed;
    inset: 0;
    background: var(--paper);
    z-index: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    animation: fadeIn 0.25s ease;
  }
  .mode-splash-logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .mode-splash-logo span { color: var(--accent); }
  .mode-splash-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .mode-splash-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .mode-splash-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    width: 100%;
    max-width: 380px;
    margin-bottom: 28px;
  }
  .mode-splash-btn {
    padding: 22px 16px;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    border-right: 1px solid var(--border);
  }
  .mode-splash-btn:last-child { border-right: none; }
  .mode-splash-btn:hover { background: var(--cream); }
  .mode-splash-btn.active {
    background: var(--ink);
    color: var(--paper);
  }
  .mode-splash-btn-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
  .mode-splash-btn-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: inherit;
    display: block;
    margin-bottom: 4px;
  }
  .mode-splash-btn-desc {
    font-size: 0.76rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
  }
  .mode-splash-btn.active .mode-splash-btn-desc { color: rgba(245,240,232,0.7); }

  /* Game picker (shown in Play mode on splash) */
  .mode-splash-games {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 380px;
    max-height: 50vh;
    overflow-y: auto;
    animation: clueIn 0.25s ease;
  }
  .splash-game-row {
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 13px 16px;
    cursor: pointer;
    background: transparent;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }
  .splash-game-row:hover { border-color: var(--accent2); background: rgba(44,120,115,0.05); }
  .splash-game-row.active { border-color: var(--accent2); background: rgba(44,120,115,0.08); }
  .splash-game-icon { font-size: 1.2rem; flex-shrink: 0; }
  .splash-game-body { flex: 1; }
  .splash-game-title { font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 600; color: var(--ink); }
  .splash-game-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--muted);
    flex-shrink: 0;
  }
  .mode-splash-confirm {
    margin-top: 20px;
    padding: 14px 40px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .mode-splash-confirm:hover { opacity: 0.8; }

  /* Slim mode toggle bar (replaces modal after initial choice) */
  .mode-toggle-bar {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--card-bg);
  }
  .mode-toggle-btn {
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }
  .mode-toggle-btn:last-child { border-right: none; }
  .mode-toggle-btn:hover { color: var(--ink); background: var(--cream); }
  .mode-toggle-btn.active { background: var(--ink); color: var(--paper); }

  /* Game picker dropdown (inline below toggle bar) */
  .game-picker-bar {
    display: none;
    gap: 6px;
    padding: 10px 32px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    scrollbar-width: none;
    flex-wrap: nowrap;
    align-items: center;
  }
  .game-picker-bar.visible { display: flex; }
  .game-picker-bar::-webkit-scrollbar { display: none; }
  .game-pick-btn {
    white-space: nowrap;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.73rem;
    font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .game-pick-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .game-pick-btn.active { background: var(--accent2); color: var(--paper); border-color: var(--accent2); }

  /* Mode section label (kept for any remaining usage) */
  .mode-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 20px 28px 10px;
  }
  .mode-divider { height: 1px; background: var(--border); margin: 4px 28px; }

  /* Flag typed input */
  .flag-type-form {
    padding: 16px 24px 8px;
    display: flex;
    gap: 10px;
  }
  .flag-type-input {
    flex: 1;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .flag-type-input:focus { border-color: var(--ink); }
  .flag-type-input.correct { border-color: var(--accent2); background: rgba(44,120,115,0.06); }
  .flag-type-input.wrong   { border-color: var(--accent);  background: rgba(192,57,43,0.05); }
  .flag-type-submit {
    padding: 12px 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
  }
  .flag-type-submit:hover { opacity: 0.8; }
  .flag-type-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0 24px 16px;
    letter-spacing: 0.02em;
  }

  /* Swipe hint */
  .swipe-hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 12px;
    opacity: 0;
    animation: hintFade 3s ease 1.2s forwards;
    pointer-events: none;
  }
  @keyframes hintFade {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Card swipe drag feedback */
  .card.dragging {
    transition: none !important;
    cursor: grabbing;
  }
  .card.swipe-left  { animation: swipeLeft  0.28s ease forwards; }
  .card.swipe-right { animation: swipeRight 0.28s ease forwards; }
  @keyframes swipeLeft  { to { transform: translateX(-120%) rotate(-8deg); opacity: 0; } }
  @keyframes swipeRight { to { transform: translateX( 120%) rotate( 8deg); opacity: 0; } }

  /* Share button */
  .btn-share {
    padding: 14px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.18s;
    color: var(--muted);
  }
  .btn-share:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(44,120,115,0.06);
  }

  .btn-speak {
    padding: 14px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.18s;
    color: var(--muted);
  }
  .btn-speak:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,134,11,0.06);
  }
  .btn-speak.speaking {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,134,11,0.08);
    animation: speakPulse 1.2s ease-in-out infinite;
  }
  @keyframes speakPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* History panel overlay */
  .history-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }
  .history-panel {
    background: var(--card-bg);
    width: 100%;
    max-height: 80vh;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .history-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .history-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
  }
  .history-close {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
    padding: 4px;
  }
  .history-list {
    overflow-y: auto;
    padding: 12px 0 24px;
    -webkit-overflow-scrolling: touch;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:hover { background: var(--cream); }
  .history-item:last-child { border-bottom: none; }
  .history-thumb {
    width: 44px;
    height: 44px;
    border-radius: 3px;
    object-fit: cover;
    background: var(--cream);
    flex-shrink: 0;
  }
  .history-thumb-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 3px;
    background: var(--cream);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: var(--muted);
  }
  .history-info { flex: 1; min-width: 0; }
  .history-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-domain {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }
  .history-arrow {
    color: var(--muted);
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .history-unsave {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 9px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.15s;
    line-height: 1;
  }
  .history-unsave:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(192,57,43,0.06);
  }

  .panel-empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
  }
  .panel-empty-icon { font-size: 2.2rem; margin-bottom: 12px; }

  .domain-pill.domain-pill-game {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .domain-pill.domain-pill-game:hover, .domain-pill.domain-pill-game.active {
    background: var(--accent2);
    color: var(--paper);
    border-color: var(--accent2);
  }

  /* Flag game card */
  .flag-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1);
    touch-action: pan-y;
  }
  .flag-display {
    width: 100%;
    padding: 36px 0 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .flag-img {
    width: 220px;
    height: auto;
    border-radius: 3px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: block;
    transition: filter 0.3s ease;
  }
  .flag-load-err {
    width: 220px;
    height: 140px;
    border: 2px dashed var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
  }
  .flag-emoji-display {
    font-size: 120px;
    line-height: 1;
    display: block;
    text-align: center;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    user-select: none;
  }
  .flag-img.blurred { filter: blur(8px); cursor: pointer; }
  .flag-blur-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .flag-game-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .flag-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 24px;
  }
  .flag-option {
    padding: 14px 10px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    background: transparent;
    color: var(--ink);
    line-height: 1.3;
  }
  .flag-option:hover:not(:disabled) { border-color: var(--ink); background: var(--cream); }
  .flag-option.correct { border-color: var(--accent2); background: rgba(44,120,115,0.1); color: var(--accent2); font-weight: 500; }
  .flag-option.wrong   { border-color: var(--accent);  background: rgba(192,57,43,0.07);  color: var(--accent); }
  .flag-option:disabled { cursor: default; }
  .flag-score {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 0 24px 20px;
    letter-spacing: 0.04em;
  }
  .flag-reveal {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--cream);
    animation: clueIn 0.3s ease;
  }
  .flag-reveal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .flag-reveal-desc {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .flag-wiki-link {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent2);
    text-decoration: none;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--accent2);
    padding-bottom: 1px;
  }
  .flag-wiki-link:hover { opacity: 0.75; }

  /* Country guessing game */
  .country-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .country-header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .country-header h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .country-clue-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: rgba(255,255,255,0.15);
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 0.04em;
  }
  .country-clues { padding: 20px 24px 8px; }
  .country-clue {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: clueIn 0.3s ease;
  }
  @keyframes clueIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .country-clue:last-child { border-bottom: none; }
  .clue-icon { font-size: 1.1rem; flex-shrink: 0; width: 24px; text-align: center; margin-top: 1px; }
  .clue-text { font-size: 0.92rem; line-height: 1.5; color: var(--ink); }
  .clue-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }
  .country-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 24px 20px;
  }
  .country-option {
    padding: 12px 10px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    background: transparent;
    color: var(--ink);
  }
  .country-option:hover:not(:disabled) { border-color: var(--ink); background: var(--cream); }
  .country-option.correct { border-color: var(--accent2); background: rgba(44,120,115,0.1); color: var(--accent2); font-weight: 500; }
  .country-option.wrong   { border-color: var(--accent);  background: rgba(192,57,43,0.07);  color: var(--accent); }
  .country-option:disabled { cursor: default; }
  .country-next-clue {
    width: calc(100% - 48px);
    margin: 0 24px 20px;
    padding: 12px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .country-next-clue:hover { border-color: var(--ink); color: var(--ink); }
  .country-score { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); text-align: center; padding: 0 24px 18px; letter-spacing: 0.04em; }

  .quiz-options.tf-options {
    flex-direction: row;
    gap: 12px;
  }
  .quiz-options.tf-options .quiz-option {
    flex: 1;
    text-align: center;
    font-size: 1rem;
    padding: 18px;
    font-weight: 500;
  }

  /* Matching pairs quiz */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
  }
  .match-col-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
    text-align: center;
  }
  .match-item {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-size: 0.82rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.3;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .match-item:hover:not(:disabled) { border-color: var(--ink); background: var(--cream); }
  .match-item.selected { border-color: var(--gold); background: rgba(184,134,11,0.08); color: var(--ink); }
  .match-item.matched-correct { border-color: var(--accent2); background: rgba(44,120,115,0.1); color: var(--accent2); }
  .match-item.matched-wrong   { border-color: var(--accent);  background: rgba(192,57,43,0.07);  color: var(--accent); }
  .match-item:disabled { cursor: default; }

  @media (max-width: 480px) {
    header { padding: calc(16px + var(--safe-top)) 20px 16px; }
    .domain-bar { padding: 12px 20px; }
    main { padding: 24px 16px calc(60px + var(--safe-bottom)); }
    .card-body { padding: 24px 22px 20px; }
    .card-footer { padding: 14px 22px 18px; }
    .card-title { font-size: 1.5rem; }
    .history-panel { max-height: 88vh; }
  }

  /* ── LOGO GAME ── */
  .logo-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);

const QUIZ_INTERVAL = 20;

const QUIZ_POOL_SIZE = 20;

let state = {
  seen: [],          // last 60 cards (for quiz pool)
  saved: [],         // bookmarked items
  currentCard: null,
  domain: 'random',
  cardCount: 0,
  quizzesTaken: 0,
  bestScore: null,
  expanded: false,
  isLoading: false,
  seenTitles: new Set(), // full history — persisted separately, never capped
};

// ─── Persist everything to localStorage — no account needed ──────────────────
// Each key is device-local, never leaves the browser, no tracking.
try {
  const stored = localStorage.getItem('curioApp');
  if (stored) {
    const p = JSON.parse(stored);
    state.seen         = p.seen         || [];
    state.saved        = p.saved        || [];
    state.cardCount    = p.cardCount    || 0;
    state.quizzesTaken = p.quizzesTaken || 0;
    state.bestScore    = p.bestScore    || null;
    state.domain       = p.domain       || 'random';
  }
} catch(e) {}

// Restore full dedup set (may be larger than the seen card list)
try {
  const titles = localStorage.getItem('curioSeenTitles');
  if (titles) state.seenTitles = new Set(JSON.parse(titles));
} catch(e) {}

// Seed dedup set from restored seen list in case titles key is missing
state.seen.forEach(c => state.seenTitles.add(c.title));

function saveState() {
  try {
    localStorage.setItem('curioApp', JSON.stringify({
      seen:         state.seen.slice(-60),  // last 60 cards for history panel
      saved:        state.saved,            // all bookmarks, kept forever
      cardCount:    state.cardCount,
      quizzesTaken: state.quizzesTaken,
      bestScore:    state.bestScore,
      domain:       state.domain,
    }));
  } catch(e) {}

  try {
    // Full title history for dedup — grows indefinitely, kept forever
    localStorage.setItem('curioSeenTitles', JSON.stringify([...state.seenTitles]));
  } catch(e) {}
}

// ─── Wikipedia API ────────────────────────────────────────────────────────────
async function fetchConcept() {
  state.isLoading = true;
  renderSkeleton();

  let attempts = 0;
  while (attempts < 6) {
    attempts++;
    try {
      let searchTerm;
      if (state.domain === 'random') {
        // Use Wikipedia random
        const randUrl = `https://en.wikipedia.org/api/rest_v1/page/random/summary`;
        const r = await fetch(randUrl);
        if (!r.ok) throw new Error('Random fetch failed');
        const data = await r.json();
        if (state.seenTitles.has(data.title)) continue;
        if (!data.extract || data.extract.length < 100) continue;
        state.isLoading = false;
        return processArticle(data);
      } else {
        const seeds = DOMAIN_SEEDS[state.domain];
        searchTerm = seeds[Math.floor(Math.random() * seeds.length)];
        const searchUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchTerm)}`;
        const r = await fetch(searchUrl);
        if (!r.ok) {
          // fallback: search
          const srUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}&format=json&origin=*&srlimit=8`;
          const sr = await fetch(srUrl);
          const sd = await sr.json();
          const results = sd.query?.search || [];
          for (const res of results) {
            if (state.seenTitles.has(res.title)) continue;
            const sumR = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(res.title)}`);
            if (!sumR.ok) continue;
            const sumD = await sumR.json();
            if (!sumD.extract || sumD.extract.length < 100) continue;
            state.isLoading = false;
            return processArticle(sumD, state.domain);
          }
          continue;
        }
        const data = await r.json();
        if (state.seenTitles.has(data.title)) {
          // try a nearby search instead
          const srUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(state.domain)}&format=json&origin=*&srlimit=12&sroffset=${Math.floor(Math.random()*50)}`;
          const sr = await fetch(srUrl);
          const sd = await sr.json();
          const results = (sd.query?.search || []).filter(r => !state.seenTitles.has(r.title));
          if (results.length === 0) continue;
          const pick = results[Math.floor(Math.random() * results.length)];
          const sumR = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pick.title)}`);
          if (!sumR.ok) continue;
          const sumD = await sumR.json();
          if (!sumD.extract || sumD.extract.length < 100) continue;
          state.isLoading = false;
          return processArticle(sumD, state.domain);
        }
        if (!data.extract || data.extract.length < 100) continue;
        state.isLoading = false;
        return processArticle(data, state.domain);
      }
    } catch(e) {
      if (attempts >= 5) break;
    }
  }

  state.isLoading = false;
  renderError();
  return null;
}

function processArticle(data, domain) {
  const card = {
    title: data.title,
    summary: data.extract,
    url: data.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(data.title)}`,
    image: data.thumbnail?.source || null,
    domain: domain || guessDomain(data.title, data.extract),
  };
  return card;
}

function guessDomain(title, text) {
  const t = (title + ' ' + text).toLowerCase();
  if (/\b(stock|bond|interest rate|hedge fund|equity|capital|futures|options|derivatives|arbitrage|liquidity|portfolio|leverage|ipo|securit)\b/.test(t)) return 'finance';
  if (/\b(gdp|inflation|monetary policy|fiscal|supply and demand|keynesian|comparative advantage|externality|oligopoly|elasticity)\b/.test(t)) return 'economics';
  if (/\b(statistic|probability|distribution|regression|bayesian|hypothesis|variance|p-value|confidence interval|standard deviation)\b/.test(t)) return 'statistics';
  if (/\b(depreciation|ebitda|balance sheet|bookkeeping|accrual|amortization|audit|cash flow|earnings per share|retained earnings)\b/.test(t)) return 'accounting';
  if (/\b(porter|swot|supply chain|brand|franchise|corporate governance|lean manufacturing|market segment|value chain|disruptive)\b/.test(t)) return 'business';
  if (/\b(common law|tort|habeas corpus|contract law|precedent|mens rea|fiduciary|intellectual property|jurisprudence|statute)\b/.test(t)) return 'law';
  if (/\b(cognitive dissonance|maslow|operant conditioning|confirmation bias|attachment theory|dunning-kruger|groupthink|heuristic|psycholog)\b/.test(t)) return 'psychology';
  if (/\b(algorithm|software|computer|programming|network|digital|technology|ai|machine learning|blockchain|quantum computing)\b/.test(t)) return 'technology';
  if (/\b(dna|evolution|cell|genome|species|organism|ecosystem|gene|phenotype|taxonomy|symbiosis|mitosis|phylogen)\b/.test(t)) return 'biology';
  if (/\b(disease|medicine|medical|clinical|diagnosis|patient|treatment|surgery|pathogen|immune|vaccine|oncology|pharmacol)\b/.test(t)) return 'medicine';
  if (/\b(physics|chemistry|quantum|thermodynamics|relativity|electromagnetism|photosynthesis|black hole|entropy|periodic table|dark matter)\b/.test(t)) return 'science';
  if (/\b(war|empire|revolution|ancient|century|civilization|colonial|dynasty|historical|medieval|renaissance)\b/.test(t)) return 'history';
  if (/\b(nato|sovereignty|geopolit|nuclear deterrence|foreign policy|diplomacy|sanctions|hegemony|proxy war|multilateral)\b/.test(t)) return 'geopolitics';
  if (/\b(geography|continent|ocean|climate|biome|mountain|river|country|population|urbaniz|latitude|longitude)\b/.test(t)) return 'geography';
  if (/\b(philosophy|epistemology|metaphysics|plato|aristotle|kant|nietzsche|phenomenology|dialectic|ontology)\b/.test(t)) return 'philosophy';
  if (/\b(ethics|moral|utilitari|deontolog|virtue|justice|rights|bioethics|consequentialism|trolley problem)\b/.test(t)) return 'ethics';
  if (/\b(fallacy|syllogism|rhetoric|deductive|inductive|logical|argument|reasoning|paradox|reductio)\b/.test(t)) return 'logic';
  if (/\b(cogniti|perception|memory|attention|neuroplasticity|consciousness|decision making|mental model|executive function)\b/.test(t)) return 'cognitive';
  if (/\b(linguist|phoneme|syntax|semantics|grammar|language family|morphology|chomsky|dialect|phonetics)\b/.test(t)) return 'linguistics';
  if (/\b(mathematics|theorem|proof|equation|algebra|calculus|geometry|number theory|topology|combinatorics)\b/.test(t)) return 'mathematics';
  if (/\b(astrono|galaxy|star|planet|cosmos|nebula|supernova|black hole|orbit|telescope|NASA|exoplanet|dark matter)\b/.test(t)) return 'astronomy';
  if (/\b(architect|building|structure|facade|bauhaus|brutalism|modernism|urban planning|construction|design)\b/.test(t)) return 'architecture';
  if (/\b(sociology|social|stratification|anomie|durkheim|weber|marx|cultural capital|gender|deviance|institution)\b/.test(t)) return 'sociology';
  return 'general';
}

  if (state.seen.length >= QUIZ_INTERVAL && state.cardCount % QUIZ_INTERVAL === 0 && state.cardCount > 0) {
    el.innerHTML = `

function toggleExpand() {
  const el = document.getElementById('cardSummary');

    el.textContent = state.currentCard.summary;

  } else {
    el.textContent = state.currentCard.summary.slice(0, 480) + '…';
    el.classList.add('truncated');
    if (btn) btn.textContent = 'Read more';

}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Scrub the flag's own name (and significant words) from description text
// so the answer isn't given away in the reveal or hint text.
function scrubFlagName(text, name) {
  // Strip parenthetical suffixes like "(US State)" for scrubbing purposes
  const coreName = name.replace(/\s*\(.*?\)\s*/g, '').trim();
  const words = coreName.split(/[\s\-\/]+/).filter(w => w.length >= 4);
  let out = text;
  // Replace full core name first
  const re = (s) => new RegExp(s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  out = out.replace(re(coreName), '▓▓▓▓▓');
  // Replace significant individual words
  words.forEach(w => { out = out.replace(re(w), '▓▓▓▓▓'); });
  return out;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
async function nextCard() {
  stopSpeech();
  if (searchMode) { loadSearchCard(); return; }
  const existing = document.getElementById('mainCard');
  if (existing) existing.classList.add('leaving');

  setTimeout(async () => {
    const card = await fetchConcept();
    if (card) {
      state.cardCount++;
      state.seenTitles.add(card.title);
      state.seen.push(card);
      saveState();
      renderCard(card);

      // Auto-trigger quiz at milestone
      if (state.cardCount > 0 && state.cardCount % QUIZ_INTERVAL === 0 && state.seen.length >= QUIZ_Q_COUNT) {
        setTimeout(() => startQuiz(), 800);
      }
    }
  }, 200);
}

function setDomain(domain) {
  stopSpeech();
  if (searchMode) exitSearchMode();
  appMode = 'learn';
  updateToggleBar();
  state.domain = domain;
  document.getElementById('gamePickerBar').classList.remove('visible');
  document.getElementById('domainBar').style.display = 'flex';
  document.querySelectorAll('.domain-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.domain === domain);
  });
  document.getElementById('statsStrip').style.display = 'flex';
  saveState();
  nextCard();
}

function toggleSave() {
  if (!state.currentCard) return;
  const idx = state.saved.findIndex(s => s.title === state.currentCard.title);
  if (idx >= 0) {
    state.saved.splice(idx, 1);
    document.getElementById('saveBtn').innerHTML = '☆';
    document.getElementById('saveBtn').classList.remove('saved');
    showToast('Removed from saved');
  } else {
    state.saved.push(state.currentCard);
    document.getElementById('saveBtn').innerHTML = '⭐';
    document.getElementById('saveBtn').classList.add('saved');
    showToast('Saved!');
  }
  document.getElementById('savedCount').textContent = state.saved.length;
  saveState();
  // Refresh saved panel if it's open
  if (document.getElementById('savedOverlay').style.display !== 'none') {
    renderSavedPanel();
  }
}

function showSaved() {
  renderSavedPanel();
  const overlay = document.getElementById('savedOverlay');
  overlay.style.display = 'flex';
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeSaved();
  });
}

function closeSaved() {

}

function unsaveFromPanel(title) {
  const idx = state.saved.findIndex(s => s.title === title);
  if (idx < 0) return;
  state.saved.splice(idx, 1);
  document.getElementById('savedCount').textContent = state.saved.length;
  saveState();
  // Refresh the panel in place
  renderSavedPanel();
  // Update save button on current card if it matches
  if (state.currentCard && state.currentCard.title === title) {
    const btn = document.getElementById('saveBtn');
    if (btn) { btn.innerHTML = '☆'; btn.classList.remove('saved'); }
  }
  showToast('Removed from saved');
}

// ─── Quiz ─────────────────────────────────────────────────────────────────────
function startQuiz() {
  const pool = [...state.seen].slice(-QUIZ_POOL_SIZE);
  if (pool.length < QUIZ_Q_COUNT) {
    showToast('Keep exploring — need more concepts for a quiz!');
    return;
  }

  // Build Q&A from pool
  const shuffled = pool.sort(() => Math.random() - 0.5);
  const questions = shuffled.slice(0, QUIZ_Q_COUNT).map((card, i) => buildQuestion(card, pool, i));

  let current = 0;
  let score = 0;
  let answered = false;

  function renderQuizQ() {
    if (current >= questions.length) {
      renderScore();
      return;
    }
    const q = questions[current];
    answered = false;

    document.getElementById('quizOverlay').style.display = 'flex';
    document.getElementById('quizOverlay').innerHTML = `
      <div class="quiz-panel">
        <div class="quiz-header">
          <h2>Knowledge Check</h2>
          <span class="quiz-badge">Q ${current + 1}/${questions.length}</span>
        </div>
        <div class="quiz-body">
          <div class="quiz-q-label">${q.type === 'blank' ? 'Fill in the blank' : q.type === 'truefalse' ? 'True or false?' : 'Name the concept'}</div>
          <div class="quiz-question">${q.question.split('\n\n').map((part, i) => i === 1 ? `<div class="quiz-clue ${q.type === 'blank' ? 'quiz-clue-blank' : ''}">${escHtml(part).replace(/________/g, '<span class="blank-slot">________</span>')}</div>` : escHtml(part)).join('')}</div>
          <div class="quiz-options ${q.type === 'truefalse' ? 'tf-options' : ''}" id="quizOptions">
            ${q.options.map((opt, i) => `
              <button class="quiz-option" onclick="answerQ(${i}, ${q.correct}, this)">${escHtml(opt)}</button>
            `).join('')}
          </div>
          <div class="quiz-feedback" id="quizFeedback"></div>
        </div>
        <div class="quiz-nav">
          <button class="btn-quiz-skip" onclick="skipQuiz()">End quiz</button>
          <button class="btn-quiz-next" id="quizNextBtn" onclick="advanceQ()" style="display:none">Next →</button>
        </div>
      </div>`;
  }

  function answerQ(chosen, correct, btn) {
    if (answered) return;
    answered = true;
    const options = document.querySelectorAll('.quiz-option');
    options.forEach(b => b.disabled = true);
    options[correct].classList.add('correct');
    const fb = document.getElementById('quizFeedback');
    if (chosen === correct) {
      score++;
      btn.classList.add('correct');
      fb.className = 'quiz-feedback correct-fb show';
      fb.textContent = '✓ Correct! ' + questions[current].explanation;
    } else {
      btn.classList.add('wrong');
      fb.className = 'quiz-feedback wrong-fb show';
      fb.textContent = '✗ The answer was: ' + questions[current].options[correct] + '. ' + questions[current].explanation;
    }
    document.getElementById('quizNextBtn').style.display = 'block';
  }

  function advanceQ() {
    current++;
    renderQuizQ();
  }

  function skipQuiz() {
    document.getElementById('quizOverlay').style.display = 'none';
  }

  function renderScore() {
    const pct = Math.round((score / questions.length) * 100);
    state.quizzesTaken++;
    if (state.bestScore === null || pct > state.bestScore) state.bestScore = pct;
    saveState();

    const emoji = pct === 100 ? '🏆' : pct >= 75 ? '🎉' : pct >= 50 ? '🙂' : '📚';
    const msg   = pct === 100 ? 'Perfect score!' : pct >= 75 ? 'Great job!' : pct >= 50 ? 'Not bad — keep exploring!' : 'Keep reading and try again!';

    document.getElementById('quizOverlay').innerHTML = `
      <div class="quiz-panel">
        <div class="quiz-header">
          <h2>Quiz Complete</h2>
          <span class="quiz-badge">Results</span>
        </div>
        <div class="quiz-score-body">
          <div class="score-ring" style="border-color:${pct>=75?'var(--accent2)':'var(--accent)'}">
            ${emoji}
          </div>
          <div class="quiz-score-title">${score}/${questions.length} correct — ${pct}%</div>
          <div class="quiz-score-sub">${msg}<br><br>Keep discovering concepts to unlock your next quiz.</div>
        </div>
        <div class="quiz-nav">
          <button class="btn-quiz-next" onclick="closeQuiz()">Continue exploring →</button>
        </div>
      </div>`;
  }

  window.answerQ = answerQ;
  window.advanceQ = advanceQ;
  window.skipQuiz = skipQuiz;
  window.closeQuiz = () => {
    document.getElementById('quizOverlay').style.display = 'none';
    document.getElementById('statQuizzes').textContent = state.quizzesTaken;
    document.getElementById('statScore').textContent = state.bestScore + '%';
    renderMilestoneBanner();
  };

  renderQuizQ();
}

// Router: cycle through question types across the quiz
function buildQuestion(card, pool, index) {
  const type = index % 3;
  if (type === 0) return buildTitleMatch(card, pool);
  if (type === 1) return buildFillBlank(card, pool);
  return buildTrueFalse(card, pool);
}

// ── Type A: Title-matching ──────────────────────────────────────────────────
// Show a descriptive clue; all four options are article titles.
function buildTitleMatch(card, pool) {
  const sentences = card.summary
    .split(/(?<=[.!?])\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 50);

  const titleWords = card.title.toLowerCase().split(/\s+/).filter(w => w.length > 3);

  // Prefer a sentence that doesn't already contain the title
  const cleanClue = sentences.find(s =>
    !titleWords.some(w => s.toLowerCase().includes(w))
  ) || sentences[1] || sentences[0] || card.summary.slice(0, 160);

  let clue = cleanClue.slice(0, 200);
  titleWords.forEach(w => {
    clue = clue.replace(new RegExp(`\\b${w}\\b`, 'gi'), '___');
  });

  const distractors = pool
    .filter(c => c.title !== card.title)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(c => c.title);
  while (distractors.length < 3) distractors.push('None of the above');

  const allOptions = shuffle([card.title, ...distractors]);
  const explanation = (sentences[0] || card.summary).slice(0, 200);

  return {
    type: 'title',
    question: `Which concept is being described?\n\n${clue}`,
    options: allOptions,
    correct: allOptions.indexOf(card.title),
    explanation,
  };
}

// ── Type B: Fill-in-the-blank ───────────────────────────────────────────────
// Take a sentence containing the title; blank it out.
// Options are the correct title plus three other titles from the pool.
function buildFillBlank(card, pool) {
  const sentences = card.summary
    .split(/(?<=[.!?])\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 50);

  const titleWords = card.title.toLowerCase().split(/\s+/).filter(w => w.length > 3);

  // Find a sentence that actually mentions the title (or a key word from it)
  let targetSentence = sentences.find(s =>
    titleWords.some(w => s.toLowerCase().includes(w))
  ) || sentences[0] || card.summary.slice(0, 160);

  // Replace the title (and its key words) with a blank
  let blanked = targetSentence.slice(0, 220);
  // Try replacing the full title first
  const fullTitleRe = new RegExp(card.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  const hadFullTitle = fullTitleRe.test(blanked);
  if (hadFullTitle) {
    blanked = blanked.replace(fullTitleRe, '________');
  } else {
    // Fall back to replacing significant title words
    titleWords.forEach(w => {
      blanked = blanked.replace(new RegExp(`\\b${w}\\b`, 'gi'), '________');
    });
  }

  // If nothing was blanked, force-insert a blank
  if (!blanked.includes('________')) {
    blanked = `________ — ${blanked.slice(0, 160)}`;
  }

  const distractors = pool
    .filter(c => c.title !== card.title)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(c => c.title);
  while (distractors.length < 3) distractors.push('None of the above');

  const allOptions = shuffle([card.title, ...distractors]);
  const explanation = targetSentence.slice(0, 200);

  return {
    type: 'blank',
    question: `Fill in the blank:\n\n${blanked}`,
    options: allOptions,
    correct: allOptions.indexOf(card.title),
    explanation,
  };
}

// ── Type C: True / False ───────────────────────────────────────────────────
// Take a fact from the correct card; 50% chance swap the subject with a
// distractor title so the statement becomes false.
function buildTrueFalse(card, pool) {
  const sentences = card.summary
    .split(/(?<=[.!?])\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 40 && s.length < 200);

  const baseSentence = sentences[0] || card.summary.slice(0, 160);
  const isTrue = Math.random() > 0.5;

  let statement, correct, explanation;

  if (isTrue) {
    // Statement is genuinely from this card — answer is True
    statement = baseSentence;
    correct = 0; // index of "True" option
    explanation = `Correct. ${baseSentence}`;
  } else {
    // Swap the card title for a distractor to make it false
    const distractor = pool
      .filter(c => c.title !== card.title)
      .sort(() => Math.random() - 0.5)[0];

    if (distractor) {
      const titleWords = card.title.toLowerCase().split(/\s+/).filter(w => w.length > 3);
      let swapped = baseSentence;
      const fullRe = new RegExp(card.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      if (fullRe.test(swapped)) {
        swapped = swapped.replace(fullRe, distractor.title);
      } else {
        // Prepend a false attribution
        swapped = `${distractor.title} — ${swapped}`;
      }
      statement = swapped;
      correct = 1; // index of "False" option
      explanation = `False. This describes "${card.title}", not "${distractor.title}".`;
    } else {
      // Fallback: just ask a true statement
      statement = baseSentence;
      correct = 0;
      explanation = `Correct. ${baseSentence}`;
    }
  }

  return {
    type: 'truefalse',
    question: `True or false?\n\n${statement}`,
    options: ['True', 'False'],
    correct,
    explanation,
  };
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─── Swipe Gestures ───────────────────────────────────────────────────────────
(function initSwipe() {
  let startX = 0, startY = 0;
  let isHorizontal = null; // null = undecided, true = horizontal, false = vertical
  let active = false;
  const THRESHOLD = 60;    // px to trigger card change
  const LOCK_ANGLE = 20;   // degrees — lock direction after this much movement

  function getCard() { return document.getElementById('mainCard'); }
  function overlayOpen() {
    return document.getElementById('quizOverlay').style.display !== 'none'
        || document.getElementById('historyOverlay').style.display !== 'none'
        || document.getElementById('savedOverlay').style.display !== 'none';
  }

  // Attach to the main content area so the whole screen is swipeable
  document.addEventListener('touchstart', e => {
    if (overlayOpen()) return;
    if (!getCard()) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isHorizontal = null;
    active = true;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!active || !getCard()) return;

    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Wait until there's enough movement to decide direction
    if (isHorizontal === null) {
      if (dist < 8) return; // too small to judge yet
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    }

    if (!isHorizontal) return; // vertical scroll — leave it alone

    // It's a horizontal swipe — prevent page scroll and move the card
    e.preventDefault();

    const card = getCard();
    const rotate = dx * 0.05;
    const fade   = Math.max(0.35, 1 - Math.abs(dx) / 280);
    card.style.transform  = `translateX(${dx}px) rotate(${rotate}deg)`;
    card.style.opacity    = fade;
    card.style.transition = 'none';
  }, { passive: false }); // passive: false so we can call preventDefault

  document.addEventListener('touchend', e => {
    if (!active) return;
    active = false;

    const card = getCard();
    if (!card || !isHorizontal) return;

    const dx = e.changedTouches[0].clientX - startX;

    if (Math.abs(dx) >= THRESHOLD) {
      // Commit the swipe — fly the card off screen
      card.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
      card.style.transform  = `translateX(${dx < 0 ? -110 : 110}vw) rotate(${dx < 0 ? -10 : 10}deg)`;
      card.style.opacity    = '0';
      setTimeout(() => { if (appMode === 'learn') nextCard(); }, 240);
    } else {
      // Snap back
      card.style.transition = 'transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease';
      card.style.transform  = '';
      card.style.opacity    = '';
    }
  }, { passive: true });

  document.addEventListener('touchcancel', () => {
    active = false;
    const card = getCard();
    if (!card) return;
    card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    card.style.transform  = '';
    card.style.opacity    = '';
  }, { passive: true });
})();

// ─── History Panel ────────────────────────────────────────────────────────────
function showHistory() {
  const all = [...state.seen].reverse(); // most recent first
  if (all.length === 0) {
    showToast('No history yet — start exploring!');
    return;
  }

  const items = all.map(card => `
    <div class="history-item" onclick="openHistoryCard('${escAttr(card.title)}')">
      ${card.image
        ? `<img class="history-thumb" src="${card.image}" alt="" onerror="this.style.display='none'">`
        : `<div class="history-thumb-placeholder">📄</div>`}
      <div class="history-info">
        <div class="history-title">${escHtml(card.title)}</div>
        <div class="history-domain">${card.domain || '—'}</div>
      </div>
      <div class="history-arrow">↗</div>
    </div>`).join('');

  const overlay = document.getElementById('historyOverlay');
  overlay.style.display = 'flex';
  overlay.className = 'history-overlay';
  overlay.innerHTML = `
    <div class="history-panel">
      <div class="history-header">
        <h2>Reading History <span style="font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--muted);font-weight:400">${all.length} concepts</span></h2>
        <button class="history-close" onclick="closeHistory()">✕</button>
      </div>
      <div class="history-list">${items}</div>
    </div>`;

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeHistory();
  });
}

function closeHistory() {
  document.getElementById('historyOverlay').style.display = 'none';
}

function openHistoryCard(title) {
  const card = state.seen.find(c => c.title === title);
  if (!card) return;
  closeHistory();
  // Show a read-only preview via a quick re-render
  state.currentCard = card;
  state.expanded = false;
  const isSaved = state.saved.some(s => s.title === card.title);
  const truncatedSummary = card.summary.length > 480 ? card.summary.slice(0, 480) + '…' : card.summary;
  const canExpand = card.summary.length > 480;
  const imageHtml = card.image ? `<img class="card-image" src="${card.image}" alt="${escHtml(card.title)}" onerror="this.style.display='none'">` : '';

  document.getElementById('cardArea').innerHTML = `
    <div class="card-container">
      <div class="card" id="mainCard">
        ${imageHtml}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-domain">${card.domain || '—'}</span>
            <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);margin-left:auto">from history</span>
          </div>
          <h1 class="card-title">${escHtml(card.title)}</h1>
          <p class="card-summary ${canExpand ? 'truncated' : ''}" id="cardSummary">${escHtml(truncatedSummary)}</p>
        </div>
        <div class="card-footer">
          ${canExpand ? `<button class="read-more-btn" onclick="toggleExpand()">Read more</button>` : '<span></span>'}
          <a class="wiki-link" href="${card.url}" target="_blank" rel="noopener">Wikipedia ↗</a>

      <button class="btn-speak" id="speakBtn" onclick="toggleSpeak()" title="Read aloud">🔊</button>
      <button class="btn-share" onclick="shareCard()" title="Share">↗</button>

}

function escAttr(str) {
  return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// ─── Text to Speech ───────────────────────────────────────────────────────────
function toggleSpeak() {
  const synth = window.speechSynthesis;
  if (!synth) { showToast('Text-to-speech not supported on this browser'); return; }

  const btn = document.getElementById('speakBtn');

  // If already speaking, stop
  if (synth.speaking) {
    synth.cancel();
    if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊'; }
    return;
  }

  const card = state.currentCard;
  if (!card) return;

  // Read title + full summary (not truncated)
  const text = `${card.title}. ${card.summary}`;
  const utterance = new SpeechSynthesisUtterance(text);

  // Natural reading settings
  utterance.rate  = 0.92;  // slightly slower than default for clarity
  utterance.pitch = 1.0;
  utterance.lang  = 'en-US';

  // Try to pick a natural-sounding voice if available
  const voices = synth.getVoices();
  const preferred = voices.find(v =>
    /samantha|karen|daniel|moira|rishi/i.test(v.name)
  ) || voices.find(v => v.lang === 'en-US' && v.localService) || voices[0];
  if (preferred) utterance.voice = preferred;

  utterance.onstart = () => {
    if (btn) { btn.classList.add('speaking'); btn.textContent = '⏹'; }
  };
  utterance.onend = utterance.onerror = () => {
    if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊'; }
  };

  synth.speak(utterance);
}

function stopSpeech() {
  if (window.speechSynthesis?.speaking) {
    window.speechSynthesis.cancel();
  }
  const btn = document.getElementById('speakBtn');
  if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊'; }
}

// ─── Share Card ───────────────────────────────────────────────────────────────
async function shareCard() {
  const card = state.currentCard;
  if (!card) return;

  const text = `"${card.title}" — ${card.summary.slice(0, 160)}…\n\nRead more: ${card.url}`;

  // Use native share sheet on mobile (iOS/Android)
  if (navigator.share) {
    try {
      await navigator.share({
        title: card.title,
        text: card.summary.slice(0, 200) + '…',
        url: card.url,
      });
      return;
    } catch(e) {
      if (e.name === 'AbortError') return; // user dismissed — that's fine
    }
  }

  // Fallback: copy rich text to clipboard
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard!');
  } catch(e) {
    // Last resort: show the URL for manual copy
    prompt('Copy this link to share:', card.url);
  }
}

let appMode = 'learn'; // 'learn' | 'play'
let gameMode = 'flag-easy-multi';

// Splash screen logic (shown on every app start)
function splashSelectMode(mode) {
  document.getElementById('splashLearnBtn').classList.toggle('active', mode === 'learn');
  document.getElementById('splashPlayBtn').classList.toggle('active', mode === 'play');
  const gamesEl = document.getElementById('splashGames');
  const confirmEl = document.getElementById('splashConfirm');
  if (mode === 'play') {
    gamesEl.style.display = 'flex';
    gamesEl.style.flexDirection = 'column';
    confirmEl.style.display = 'none'; // wait for game selection
    _splashGame = null;
    document.querySelectorAll('.splash-game-row').forEach(r => r.classList.remove('active'));
  } else {
    gamesEl.style.display = 'none';
    confirmEl.style.display = 'block';
    _splashGame = null;

  appMode = mode;
}

function splashSelectGame(game) {
  _splashGame = game;
  document.querySelectorAll('.splash-game-row').forEach(r => r.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('splashConfirm').style.display = 'block';

function confirmSplash() {
  document.getElementById('modeSplash').style.display = 'none';
  updateToggleBar();
  if (appMode === 'learn') {
    document.getElementById('gamePickerBar').classList.remove('visible');
    document.getElementById('domainBar').style.display = 'flex';
    document.getElementById('statsStrip').style.display = 'flex';
    nextCard();
  } else {
    const game = _splashGame || 'flag-easy-multi';

// Toggle bar (header Learn/Play buttons)
function switchToLearn() {
  appMode = 'learn';
  updateToggleBar();
  stopSpeech();
  document.getElementById('gamePickerBar').classList.remove('visible');
  document.getElementById('domainBar').style.display = 'flex';
  document.querySelectorAll('.domain-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.domain === state.domain);
  });
  document.getElementById('statsStrip').style.display = 'flex';
  nextCard();
}

function switchToPlay() {
  if (searchMode) exitSearchMode();
  appMode = 'play';
  updateToggleBar();
  stopSpeech();
  document.getElementById('domainBar').style.display = 'none';
  document.getElementById('gamePickerBar').classList.add('visible');
  // Auto-launch last game or default
  selectGame(gameMode || 'flag-easy-multi');
}

function updateToggleBar() {
  document.getElementById('toggleLearnBtn').classList.toggle('active', appMode === 'learn');
  document.getElementById('togglePlayBtn').classList.toggle('active', appMode === 'play');
  // Highlight active game in picker
  document.querySelectorAll('.game-pick-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.game === gameMode && appMode === 'play');
  });
}

function selectGame(game) {
  gameMode = game;
  appMode = 'play';
  updateToggleBar();
  stopSpeech();
  document.getElementById('domainBar').style.display = 'none';
  document.getElementById('gamePickerBar').classList.add('visible');
  if (game === 'flag-easy-multi') startFlagGame('easy', 'multi');
  else if (game === 'flag-easy-type') startFlagGame('easy', 'type');
  else if (game === 'flag-hard-multi') startFlagGame('hard', 'multi');
  else if (game === 'flag-hard-type') startFlagGame('hard', 'type');
  else if (game === 'country-multi') startCountryGame('multi');
  else if (game === 'country-type') startCountryGame('type');
  else if (game === 'logo-easy') startLogoGame('easy');
  else if (game === 'logo-hard') startLogoGame('hard');
  else if (game === 'logo-all')  startLogoGame('all');
}
