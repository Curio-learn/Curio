  {name:'Uber',domain:'uber.com',category:'Technology',tier:1,hint:'Founded after Travis Kalanick and Garrett Camp couldn\'t get a cab on a snowy Paris night in 2008. The name means \'above\' or \'over\' in German.',wiki:'https://en.wikipedia.org/wiki/Uber',aliases:[]},
  {name:'Airbnb',domain:'airbnb.com',category:'Technology',tier:1,hint:'The founders funded their startup by selling custom cereal boxes — \'Obama O\'s\' and \'Cap\'n McCain\'s\' — during the 2008 US presidential election. They raised $30,000.',wiki:'https://en.wikipedia.org/wiki/Airbnb',aliases:[]},
  {name:'Snapchat',domain:'snapchat.com',category:'Technology',tier:1,hint:'Originally called \'Picaboo\', it was renamed Snapchat in 2012. The ghost mascot is called \'Ghostface Chillah\', a nod to Wu-Tang Clan\'s Ghostface Killah.',wiki:'https://en.wikipedia.org/wiki/Snapchat',aliases:[]},
  {name:'TikTok',domain:'tiktok.com',category:'Technology',tier:1,hint:'Launched internationally in 2018 after ByteDance merged it with Musical.ly. The algorithm is widely considered the most sophisticated content recommendation system ever built.',wiki:'https://en.wikipedia.org/wiki/TikTok',aliases:[]},
  {name:'LinkedIn',domain:'linkedin.com',category:'Technology',tier:1,hint:'Founded in Reid Hoffman\'s living room in 2002, LinkedIn launched on May 5, 2003. It was acquired by Microsoft in 2016 for $26.2 billion.',wiki:'https://en.wikipedia.org/wiki/LinkedIn',aliases:[]},
  {name:'Zoom',domain:'zoom.us',category:'Technology',tier:1,hint:'Founded by Eric Yuan, a former Cisco engineer who was reportedly rejected 8 times for a US visa before eventually succeeding. Zoom became a verb during the 2020 pandemic.',wiki:'https://en.wikipedia.org/wiki/Zoom_Video_Communications',aliases:[]},
  {name:'Slack',domain:'slack.com',category:'Technology',tier:2,hint:'The name is an acronym: Searchable Log of All Conversation and Knowledge. It grew from an internal tool at a gaming company called Glitch that had failed.',wiki:'https://en.wikipedia.org/wiki/Slack_(software)',aliases:[]},
  {name:'Dropbox',domain:'dropbox.com',category:'Technology',tier:2,hint:'Founder Drew Houston got the idea after forgetting his USB drive before a bus trip. He built the first prototype during the journey and launched it with a simple demo video that drove 75,000 signups overnight.',wiki:'https://en.wikipedia.org/wiki/Dropbox',aliases:[]},
  {name:'Discord',domain:'discord.com',category:'Technology',tier:2,hint:'Originally built for gaming communities in 2015, Discord grew dramatically in 2020 when it expanded beyond gaming. Microsoft reportedly offered $10 billion to acquire it in 2021.',wiki:'https://en.wikipedia.org/wiki/Discord',aliases:[]},
  {name:'GitHub',domain:'github.com',category:'Technology',tier:2,hint:'The mascot is called \'Invertocat\' or \'Octocat\' — a fictional creature with a cat\'s body and an octopus\'s tentacles. Microsoft acquired GitHub in 2018 for $7.5 billion.',wiki:'https://en.wikipedia.org/wiki/GitHub',aliases:[]},
  {name:'Shopify',domain:'shopify.com',category:'Technology',tier:2,hint:'CEO Tobias Lütke originally built Shopify to sell snowboards online. When he couldn\'t find good e-commerce software, he built his own — and that became the product.',wiki:'https://en.wikipedia.org/wiki/Shopify',aliases:[]},
  {name:'Twitter',domain:'twitter.com',category:'Technology',tier:2,hint:'The name came from the dictionary definition of \'twitter\': a short burst of inconsequential information. Jack Dorsey sent the first tweet on March 21, 2006: \'just setting up my twttr\'.',wiki:'https://en.wikipedia.org/wiki/Twitter',aliases:['x','x.com']},
  {name:'eBay',domain:'ebay.com',category:'Technology',tier:2,hint:'The first item ever sold on eBay was a broken laser pointer, in 1995. Founder Pierre Omidyar was shocked someone bought it and emailed the buyer to make sure they understood it was broken. They did — they collected broken laser pointers.',wiki:'https://en.wikipedia.org/wiki/EBay',aliases:[]},
  {name:'Dell',domain:'dell.com',category:'Technology',tier:2,hint:'Michael Dell started the company from his University of Texas dorm room in 1984 with $1,000. He became the youngest CEO ever to lead a Fortune 500 company.',wiki:'https://en.wikipedia.org/wiki/Dell',aliases:[]},
  {name:'HP',domain:'hp.com',category:'Technology',tier:2,hint:'Bill Hewlett and Dave Packard flipped a coin to decide whose name came first. Founded in a one-car garage in Palo Alto in 1939 — often cited as the birthplace of Silicon Valley.',wiki:'https://en.wikipedia.org/wiki/HP_Inc.',aliases:['hewlett packard','hewlett-packard']},
  {name:'WhatsApp',domain:'whatsapp.com',category:'Technology',tier:2,hint:'Co-founder Jan Koum grew up so poor in Ukraine that he had to use a public phone to call his father in the US. The name is a play on \'What\'s up\'. Facebook acquired it for $19 billion in 2014.',wiki:'https://en.wikipedia.org/wiki/WhatsApp',aliases:[]},
  {name:'McDonald\'s',domain:'mcdonalds.com',category:'Food & Drink',tier:1,hint:'The Golden Arches are the second most recognised symbol in the world after the Christian cross. Ronald McDonald is known in Japan as \'Donald McDonald\' because the R sound is difficult in Japanese.',wiki:'https://en.wikipedia.org/wiki/McDonald%27s',aliases:['mcdonalds','maccas','mcdonald\'s']},
  {name:'Coca-Cola',domain:'coca-cola.com',category:'Food & Drink',tier:1,hint:'Santa Claus wearing red and white was popularised by Coca-Cola\'s 1931 advertising campaign. The recipe, called \'Merchandise 7X\', is kept in a vault at the World of Coca-Cola museum in Atlanta.',wiki:'https://en.wikipedia.org/wiki/Coca-Cola',aliases:['coke']},
  {name:'Pepsi',domain:'pepsi.com',category:'Food & Drink',tier:1,hint:'Originally called \'Brad\'s Drink\' after inventor Caleb Bradham, it was renamed Pepsi-Cola in 1898 — referencing the enzyme pepsin and kola nuts in the recipe.',wiki:'https://en.wikipedia.org/wiki/Pepsi',aliases:[]},
  {name:'Starbucks',domain:'starbucks.com',category:'Food & Drink',tier:1,hint:'Named after Starbuck, the first mate in Moby-Dick. The siren logo was chosen from a 16th-century Norse woodcut — the original version was far more revealing before being stylised.',wiki:'https://en.wikipedia.org/wiki/Starbucks',aliases:[]},
  {name:'KFC',domain:'kfc.com',category:'Food & Drink',tier:1,hint:'Colonel Harland Sanders began franchising at age 62 after his restaurant was bypassed by a new highway. He personally drove to restaurants to demonstrate his chicken recipe before they agreed to pay him a royalty per piece.',wiki:'https://en.wikipedia.org/wiki/KFC',aliases:['kentucky fried chicken']},
  {name:'Burger King',domain:'burgerking.com',category:'Food & Drink',tier:1,hint:'The Whopper was introduced in 1957 for 37 cents. Burger King is owned by Restaurant Brands International, the same company that owns Tim Hortons and Popeyes.',wiki:'https://en.wikipedia.org/wiki/Burger_King',aliases:['bk']},
  {name:'Subway',domain:'subway.com',category:'Food & Drink',tier:1,hint:'Founded in 1965 when 17-year-old Fred DeLuca borrowed $1,000 from family friend Peter Buck to open a sandwich shop in Bridgeport, Connecticut. It\'s now the world\'s largest restaurant chain by number of locations.',wiki:'https://en.wikipedia.org/wiki/Subway_(restaurant)',aliases:[]},
  {name:'Red Bull',domain:'redbull.com',category:'Food & Drink',tier:1,hint:'The drink is based on a Thai energy drink called Krating Daeng. Austrian businessman Dietrich Mateschitz discovered it cured his jet lag in 1982 and licensed it for the West, making him a billionaire.',wiki:'https://en.wikipedia.org/wiki/Red_Bull',aliases:[]},
  {name:'Heineken',domain:'heineken.com',category:'Food & Drink',tier:1,hint:'The three red e\'s in the Heineken logo are slightly tilted to look like they\'re \'smiling\'. The Heineken family has controlled the company for five generations.',wiki:'https://en.wikipedia.org/wiki/Heineken',aliases:[]},
  {name:'Guinness',domain:'guinness.com',category:'Food & Drink',tier:1,hint:'Arthur Guinness signed a 9,000-year lease at St. James\'s Gate brewery in Dublin in 1759 at £45 per year. The harp logo is the official state symbol of Ireland — but Guinness uses a mirror image to differentiate it.',wiki:'https://en.wikipedia.org/wiki/Guinness',aliases:[]},
  {name:'Nutella',domain:'nutella.com',category:'Food & Drink',tier:1,hint:'Invented by Pietro Ferrero in 1940s Italy during cocoa shortages — he stretched chocolate with hazelnuts. World Nutella Day is February 5th. About 365,000 tonnes are produced each year.',wiki:'https://en.wikipedia.org/wiki/Nutella',aliases:[]},
  {name:'Oreo',domain:'oreo.com',category:'Food & Drink',tier:1,hint:'The world\'s best-selling cookie since 1912. Nobody knows what \'Oreo\' means — theories include the French word for gold (or), a hill shape, or simply the sound being appealing.',wiki:'https://en.wikipedia.org/wiki/Oreo',aliases:[]},
  {name:'Heinz',domain:'heinz.com',category:'Food & Drink',tier:2,hint:'The \'57 Varieties\' slogan was created in 1896 — even though the company already had over 60 products. Henry Heinz chose 57 because he liked the look of it on a New York trolley advertisement.',wiki:'https://en.wikipedia.org/wiki/Heinz',aliases:[]},
  {name:'Pringles',domain:'pringles.com',category:'Food & Drink',tier:2,hint:'The curved saddle shape is a hyperbolic paraboloid — a mathematical form that allows the crisps to stack and resist breakage. Fredric Baur, who designed the tube, had his ashes buried in one after he died.',wiki:'https://en.wikipedia.org/wiki/Pringles',aliases:[]},
  {name:'Nescafé',domain:'nescafe.com',category:'Food & Drink',tier:2,hint:'Nestlé developed Nescafé in 1938 to help Brazil solve a massive coffee surplus crisis. It became standard issue for American soldiers in WWII, introducing millions of people to instant coffee.',wiki:'https://en.wikipedia.org/wiki/Nescaf%C3%A9',aliases:['nescafe']},
  {name:'Domino\'s',domain:'dominos.com',category:'Food & Drink',tier:2,hint:'The dots on the Domino\'s logo represent the first three stores. The founders planned to add a dot for every new store — a plan they quietly abandoned after rapid expansion made it impractical.',wiki:'https://en.wikipedia.org/wiki/Domino%27s',aliases:['dominos']},
  {name:'Pizza Hut',domain:'pizzahut.com',category:'Food & Drink',tier:2,hint:'Founded by brothers Dan and Frank Carney in 1958 with a $600 loan from their mother. The distinctive red-roofed hut shape was designed because the sign above the door only had space for 8 characters.',wiki:'https://en.wikipedia.org/wiki/Pizza_Hut',aliases:[]},
  {name:'Lay\'s',domain:'lays.com',category:'Food & Drink',tier:2,hint:'Known as Walkers in the UK, Sabritas in Mexico, and Chipsy in the Middle East. The name \'Lay\'s\' comes from founder Herman Lay, who built the largest snack food company in the US in the 1930s.',wiki:'https://en.wikipedia.org/wiki/Lay%27s',aliases:['walkers','lays']},
  {name:'Kellogg\'s',domain:'kelloggs.com',category:'Food & Drink',tier:2,hint:'Corn Flakes were invented accidentally by Dr. John Harvey Kellogg in 1894. He was trying to create a bland, healthy food for sanitarium patients — believing that flavorless food would reduce sexual urges.',wiki:'https://en.wikipedia.org/wiki/Kellogg%27s',aliases:['kelloggs']},
  {name:'Nestlé',domain:'nestle.com',category:'Food & Drink',tier:2,hint:'The Nestlé name means \'little nest\' in Swiss German — Henri Nestlé incorporated his family crest, a bird feeding chicks in a nest, directly into the logo. Founded in 1867, it\'s now the world\'s largest food company.',wiki:'https://en.wikipedia.org/wiki/Nestl%C3%A9',aliases:['nestle']},
  {name:'Tesla',domain:'tesla.com',category:'Automotive',tier:1,hint:'Named after Nikola Tesla, the inventor who pioneered AC electricity. Elon Musk was not a founder — he joined as chairman in 2004, a year after Martin Eberhard and Marc Tarpenning founded it.',wiki:'https://en.wikipedia.org/wiki/Tesla,_Inc.',aliases:[]},
  {name:'Ferrari',domain:'ferrari.com',category:'Automotive',tier:1,hint:'The prancing horse logo was given to Enzo Ferrari by the mother of WWI flying ace Francesco Baracca, who had it painted on his aircraft. She believed it would bring good luck.',wiki:'https://en.wikipedia.org/wiki/Ferrari',aliases:[]},
  {name:'Lamborghini',domain:'lamborghini.com',category:'Automotive',tier:1,hint:'Ferruccio Lamborghini was a tractor manufacturer who complained to Enzo Ferrari about the clutch in his Ferrari. Ferrari dismissively told him to stick to tractors — so Lamborghini built his own sports car.',wiki:'https://en.wikipedia.org/wiki/Lamborghini',aliases:[]},
  {name:'Porsche',domain:'porsche.com',category:'Automotive',tier:1,hint:'Ferdinand Porsche also designed the original Volkswagen Beetle. The Porsche logo incorporates the Stuttgart city crest — a black horse on yellow — because the factory was built on former royal stud farm land.',wiki:'https://en.wikipedia.org/wiki/Porsche',aliases:[]},
  {name:'BMW',domain:'bmw.com',category:'Automotive',tier:1,hint:'The logo is widely believed to represent a spinning propeller — a myth BMW itself propagated in a 1929 ad. It actually derives from the Bavarian flag colours: blue and white quadrants.',wiki:'https://en.wikipedia.org/wiki/BMW',aliases:['bayerische motoren werke']},
  {name:'Mercedes-Benz',domain:'mercedes-benz.com',category:'Automotive',tier:1,hint:'The three-pointed star represents dominance over land, sea, and air. The name \'Mercedes\' came from Emil Jellinek, who insisted the cars be named after his daughter Mercedes — a Spanish name meaning \'mercies\'.',wiki:'https://en.wikipedia.org/wiki/Mercedes-Benz',aliases:['mercedes']},
  {name:'Audi',domain:'audi.com',category:'Automotive',tier:1,hint:'The four rings represent the four companies that merged to form Auto Union in 1932: Audi, DKW, Horch, and Wanderer. \'Audi\' is the Latin translation of founder August Horch\'s name — \'horch\' means \'listen\' in German.',wiki:'https://en.wikipedia.org/wiki/Audi',aliases:[]},
  {name:'Volkswagen',domain:'volkswagen.com',category:'Automotive',tier:1,hint:'The name means \'people\'s car\' in German. Hitler commissioned Ferdinand Porsche to design an affordable car for ordinary Germans. The post-war British occupiers revived the factory — British car manufacturers declined the offer to take it over.',wiki:'https://en.wikipedia.org/wiki/Volkswagen',aliases:['vw']},
  {name:'Toyota',domain:'toyota.com',category:'Automotive',tier:1,hint:'The name was changed from \'Toyoda\' (the founder\'s family name) because \'Toyota\' requires 8 brush strokes in Japanese — considered lucky. The three overlapping ellipses in the logo form the letters T, O, Y, O, T, A.',wiki:'https://en.wikipedia.org/wiki/Toyota',aliases:[]},
  {name:'Rolls-Royce',domain:'rolls-royce.com',category:'Automotive',tier:2,hint:'The Spirit of Ecstasy mascot was modelled on Eleanor Thornton, secretary to the 2nd Baron Montagu, who commissioned the first sculpture. The original design was called \'The Whisperer\' due to its secretive pose.',wiki:'https://en.wikipedia.org/wiki/Rolls-Royce',aliases:[]},
  {name:'Bentley',domain:'bentley.com',category:'Automotive',tier:2,hint:'The winged B logo has always featured wings — originally inspired by the RFC (Royal Flying Corps) because founder W.O. Bentley was fascinated by aviation. The wingspan has gradually narrowed across generations.',wiki:'https://en.wikipedia.org/wiki/Bentley',aliases:[]},
  {name:'Jeep',domain:'jeep.com',category:'Automotive',tier:2,hint:'The name may derive from \'GP\' (General Purpose) spoken quickly. During WWII, Jeep became so ubiquitous that it entered the language as a common noun — the first brand name to do so in automotive history.',wiki:'https://en.wikipedia.org/wiki/Jeep',aliases:[]},
  {name:'Ford',domain:'ford.com',category:'Automotive',tier:2,hint:'Henry Ford didn\'t invent the car but invented the moving assembly line in 1913, making cars affordable for ordinary people. The Model T cost $825 in 1908 — by 1925, the price had dropped to $260.',wiki:'https://en.wikipedia.org/wiki/Ford_Motor_Company',aliases:[]},
  {name:'Honda',domain:'honda.com',category:'Automotive',tier:2,hint:'Soichiro Honda was rejected by Toyota after WWII. He began making motorised bicycles from war-surplus engines, eventually creating one of the world\'s largest manufacturers. Honda is the world\'s largest motorcycle maker.',wiki:'https://en.wikipedia.org/wiki/Honda',aliases:[]},
  {name:'Nike',domain:'nike.com',category:'Fashion',tier:1,hint:'The Swoosh logo was designed by graphic design student Carolyn Davidson in 1971 for $35. Phil Knight initially wasn\'t thrilled with it but said \'I don\'t love it, but it\'ll grow on me.\' Davidson was later given Nike stock worth over $640,000.',wiki:'https://en.wikipedia.org/wiki/Nike,_Inc.',aliases:[]},
  {name:'Adidas',domain:'adidas.com',category:'Fashion',tier:1,hint:'Named after founder Adolf \'Adi\' Dassler. His brother Rudolf left to found Puma — the two brothers famously feuded for the rest of their lives, splitting their hometown of Herzogenaurach into two rival camps based on which brand you wore.',wiki:'https://en.wikipedia.org/wiki/Adidas',aliases:[]},
  {name:'Gucci',domain:'gucci.com',category:'Fashion',tier:1,hint:'Founded in Florence in 1921 by Guccio Gucci, who was inspired by the luggage he saw wealthy guests carrying at the Savoy hotel in London where he worked as a lift operator.',wiki:'https://en.wikipedia.org/wiki/Gucci',aliases:[]},
  {name:'Louis Vuitton',domain:'louisvuitton.com',category:'Fashion',tier:1,hint:'Louis Vuitton created flat-topped trunks specifically because round-topped trunks from other makers couldn\'t be stacked on steamships. The iconic monogram was designed in 1896 to prevent counterfeiting — it remains one of the most counterfeited logos in the world.',wiki:'https://en.wikipedia.org/wiki/Louis_Vuitton',aliases:['lv']},
  {name:'Chanel',domain:'chanel.com',category:'Fashion',tier:1,hint:'Coco Chanel didn\'t have a design background — she started making hats. She introduced trousers for women, popularised the little black dress, and launched Chanel No. 5, which remains the world\'s best-selling perfume after over a century.',wiki:'https://en.wikipedia.org/wiki/Chanel',aliases:[]},
  {name:'Rolex',domain:'rolex.com',category:'Fashion',tier:1,hint:'The name \'Rolex\' was chosen because it sounded good in every European language and could be pronounced easily. Hans Wilsdorf designed it to fit on a watch dial. The Oyster case, introduced in 1926, was the first waterproof wristwatch.',wiki:'https://en.wikipedia.org/wiki/Rolex',aliases:[]},
  {name:'Levi\'s',domain:'levi.com',category:'Fashion',tier:1,hint:'Levi Strauss and tailor Jacob Davis invented riveted denim trousers in 1873, originally designed for California gold miners who needed extremely durable work pants. The copper rivets reinforced stress points that kept tearing.',wiki:'https://en.wikipedia.org/wiki/Levi_Strauss_%26_Co.',aliases:['levis','levi strauss']},
  {name:'Prada',domain:'prada.com',category:'Fashion',tier:2,hint:'Mario Prada, who founded the company in 1913, believed women were intellectually inferior and refused to allow them to be involved in the business. The brand was saved and transformed by his granddaughter Miuccia Prada.',wiki:'https://en.wikipedia.org/wiki/Prada',aliases:[]},
  {name:'Versace',domain:'versace.com',category:'Fashion',tier:2,hint:'The Medusa head logo was chosen by founder Gianni Versace from the floor mosaics of ruins near his childhood home in Calabria. He believed Medusa made people fall in love and had no way to go back.',wiki:'https://en.wikipedia.org/wiki/Versace',aliases:[]},
  {name:'H&M',domain:'hm.com',category:'Fashion',tier:2,hint:'Originally called Hennes (\'Hers\' in Swedish) when founded in 1947. The name became Hennes & Mauritz in 1968 after acquiring a hunting and fishing store called Mauritz Widforss. The two letters H and M were kept for brevity.',wiki:'https://en.wikipedia.org/wiki/H%26M',aliases:['hennes and mauritz']},
  {name:'Zara',domain:'zara.com',category:'Fashion',tier:2,hint:'Founder Amancio Ortega originally wanted to call his first store \'Zorba\' after the film Zorba the Greek. A bar two doors down was already called Zorba so he rearranged the letters to \'Zara\'. He is one of the world\'s wealthiest people.',wiki:'https://en.wikipedia.org/wiki/Zara_(retailer)',aliases:[]},
  {name:'Ray-Ban',domain:'ray-ban.com',category:'Fashion',tier:2,hint:'Developed in 1936 for US Army Air Corps pilots who needed protection from the sun during high-altitude flying. The aviator shape was designed to cover as much of the eye area as possible. Worn by MacArthur, JFK, and later almost every Hollywood star.',wiki:'https://en.wikipedia.org/wiki/Ray-Ban',aliases:['rayban']},
  {name:'Cartier',domain:'cartier.com',category:'Fashion',tier:2,hint:'King Edward VII of England called Louis Cartier \'the jeweller of kings and the king of jewellers\'. Cartier invented the modern wristwatch in 1904 as a favour to aviator Alberto Santos-Dumont, who needed to check the time without using both hands.',wiki:'https://en.wikipedia.org/wiki/Cartier_(jeweler)',aliases:[]},
  {name:'IKEA',domain:'ikea.com',category:'Fashion',tier:2,hint:'The name is an acronym: Ingvar Kamprad (founder) + Elmtaryd (his family farm) + Agunnaryd (his village). Products are named using a Swedish word system — beds named after Norwegian places, sofas named after Swedish towns.',wiki:'https://en.wikipedia.org/wiki/IKEA',aliases:[]},
  {name:'Visa',domain:'visa.com',category:'Finance',tier:1,hint:'Chosen because the word \'visa\' is understood in every language and implies acceptance everywhere. The blue and gold colour scheme was designed to suggest reliability and value respectively.',wiki:'https://en.wikipedia.org/wiki/Visa_Inc.',aliases:[]},
  {name:'Mastercard',domain:'mastercard.com',category:'Finance',tier:1,hint:'The two overlapping circles have been part of the logo since 1968. The red circle represents the sun; the yellow represents the moon. The overlap symbolises the partnership between cardholder and merchant.',wiki:'https://en.wikipedia.org/wiki/Mastercard',aliases:[]},
  {name:'American Express',domain:'americanexpress.com',category:'Finance',tier:2,hint:'The centurion — known as the Gladiator — has appeared on AmEx cards since the late 1960s. American Express began as a freight forwarding company in 1850, not a financial services business.',wiki:'https://en.wikipedia.org/wiki/American_Express',aliases:['amex']},
  {name:'Goldman Sachs',domain:'goldmansachs.com',category:'Finance',tier:2,hint:'Founded by German immigrant Marcus Goldman in a basement in lower Manhattan in 1869. Rolling Stone journalist Matt Taibbi memorably described it as \'a great vampire squid wrapped around the face of humanity\'.',wiki:'https://en.wikipedia.org/wiki/Goldman_Sachs',aliases:[]},
  {name:'HSBC',domain:'hsbc.com',category:'Finance',tier:2,hint:'The initials stand for Hongkong and Shanghai Banking Corporation, founded in 1865 to finance trade between Europe and Asia. The distinctive red and white hexagon logo is derived from the Scottish flag, reflecting the bank\'s Scottish founders.',wiki:'https://en.wikipedia.org/wiki/HSBC',aliases:[]},
  {name:'JPMorgan',domain:'jpmorgan.com',category:'Finance',tier:2,hint:'J.P. Morgan personally stopped the Panic of 1907 by convincing New York\'s most powerful bankers to pool their resources — effectively performing the function of a central bank before the Federal Reserve existed.',wiki:'https://en.wikipedia.org/wiki/JPMorgan_Chase',aliases:['jp morgan','jpmorgan chase']},
  {name:'Disney',domain:'disney.com',category:'Media',tier:1,hint:'Walt Disney drew Mickey Mouse on a train ride after losing the rights to his earlier character Oswald the Lucky Rabbit. His wife Lillian suggested the name Mickey instead of Walt\'s original choice: Mortimer.',wiki:'https://en.wikipedia.org/wiki/The_Walt_Disney_Company',aliases:['walt disney']},
  {name:'BBC',domain:'bbc.co.uk',category:'Media',tier:1,hint:'The BBC was founded in 1927 and is the world\'s oldest national broadcaster and the largest by number of employees. The corporation produces more hours of television and radio per year than any other broadcaster.',wiki:'https://en.wikipedia.org/wiki/BBC',aliases:[]},
  {name:'CNN',domain:'cnn.com',category:'Media',tier:2,hint:'Ted Turner launched CNN on June 1, 1980 as the world\'s first 24-hour news network. Critics initially called it \'Chicken Noodle News\'. It gained credibility during the Gulf War in 1991 as the only network broadcasting live from Baghdad.',wiki:'https://en.wikipedia.org/wiki/CNN',aliases:[]},
  {name:'National Geographic',domain:'nationalgeographic.com',category:'Media',tier:2,hint:'The yellow rectangular border on the magazine cover has been used since January 1910. The society was founded in 1888 and has funded over 14,000 research and exploration projects. The first issue was so dry that only 200 copies were printed.',wiki:'https://en.wikipedia.org/wiki/National_Geographic',aliases:['nat geo','natgeo']},
  {name:'Warner Bros',domain:'warnerbros.com',category:'Media',tier:2,hint:'The four Warner brothers — Harry, Albert, Sam, and Jack — were the sons of a Polish cobbler immigrant. Sam convinced the others to invest in a movie projector in 1903. Their 1927 film The Jazz Singer was the first feature film with synchronised dialogue.',wiki:'https://en.wikipedia.org/wiki/Warner_Bros.',aliases:['warner brothers']},
  {name:'The New York Times',domain:'nytimes.com',category:'Media',tier:2,hint:'The paper has won more Pulitzer Prizes than any other news organisation — 132 as of 2023. The \'paper of record\' slogan was never official company policy but became associated with the Times through repetition.',wiki:'https://en.wikipedia.org/wiki/The_New_York_Times',aliases:['nyt','new york times']},
  {name:'NASA',domain:'nasa.gov',category:'Other',tier:1,hint:'The \'meatball\' logo was designed in 1959 by employee James Modarelli. It was replaced by the \'worm\' logo in 1975, then the meatball was restored in 1992. The worm was brought back for the 2020 Crew Dragon mission.',wiki:'https://en.wikipedia.org/wiki/NASA',aliases:[]},
  {name:'Red Cross',domain:'redcross.org',category:'Other',tier:1,hint:'The reverse of the Swiss flag — chosen to honour Henry Dunant\'s Swiss nationality when he founded the organisation in 1863 after witnessing the Battle of Solferino. Muslim-majority countries use the Red Crescent instead.',wiki:'https://en.wikipedia.org/wiki/International_Red_Cross_and_Red_Crescent_Movement',aliases:[]},
  {name:'WWF',domain:'wwf.org',category:'Other',tier:2,hint:'The giant panda logo was sketched by co-founder Sir Peter Scott in 1961, inspired by Chi-Chi the giant panda who had just arrived at London Zoo. The panda was chosen because it was recognisable in black-and-white print and crossed political boundaries.',wiki:'https://en.wikipedia.org/wiki/World_Wide_Fund_for_Nature',aliases:['world wildlife fund','world wide fund for nature']},
  {name:'Harvard',domain:'harvard.edu',category:'Other',tier:2,hint:'The oldest university in the United States, founded in 1636. The Veritas crest motto means \'truth\' in Latin. The John Harvard statue in Harvard Yard is sometimes called the \'Statue of Three Lies\': the model wasn\'t John Harvard, 1638 is wrong, and Harvard wasn\'t the founder.',wiki:'https://en.wikipedia.org/wiki/Harvard_University',aliases:['harvard university']},
  {name:'MIT',domain:'mit.edu',category:'Other',tier:2,hint:'Founded in 1861 in response to the industrialisation of America. MIT holds 20 times more patents per faculty member than any other university. Alumnus Tim Berners-Lee invented the World Wide Web while at CERN, not MIT — but 97 Nobel Laureates are affiliated with MIT.',wiki:'https://en.wikipedia.org/wiki/MIT',aliases:['massachusetts institute of technology']},
];

const FLAG_ALIASES = {
  // US States — name (US State) + abbreviation

function flagTypedMatch(input, correctName) {
  const norm = s => s.toLowerCase().trim().replace(/[^a-z0-9 ]/g, '');
  const inp = norm(input);
  const cor = norm(correctName);
  if (!inp) return false;
  // Exact match
  if (inp === cor) return true;
  // Aliases
  const aliases = FLAG_ALIASES[cor] || [];
  if (aliases.some(a => norm(a) === inp)) return true;
  // Levenshtein distance for close misspellings (moderate: within 2 edits for short, 3 for long)
  const maxDist = cor.length > 10 ? 3 : 2;
  if (levenshtein(inp, cor) <= maxDist) return true;
  // Also check aliases with levenshtein
  if (aliases.some(a => levenshtein(norm(a), inp) <= maxDist)) return true;
  return false;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

  {name:'Iowa (US State)',img:'https://flagcdn.com/w320/us-ia.png',blur:false,desc:'A vertical blue-white-red tricolour with a bald eagle carrying a ribbon. The colours echo the French flag, honouring Iowa\'s French colonial heritage.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Iowa'},
  {name:'Kansas (US State)',img:'https://flagcdn.com/w320/us-ks.png',blur:true,desc:'Dark blue with the state seal above a sunflower above the state name in gold. The seal depicts a settler\'s cabin, steamboat, and Native Americans hunting bison.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Kansas'},
  {name:'Kentucky (US State)',img:'https://flagcdn.com/w320/us-ky.png',blur:true,desc:'Navy blue with two men shaking hands — a frontiersman and a statesman — surrounded by goldenrod. The state name and motto appear on the flag.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Kentucky'},
  {name:'Louisiana (US State)',img:'https://flagcdn.com/w320/us-la.png',blur:false,desc:'Blue with a pelican feeding three young from her own breast — a symbol of self-sacrifice. Below is the motto Union, Justice, Confidence.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Louisiana'},
  {name:'Maine (US State)',img:'https://flagcdn.com/w320/us-me.png',blur:false,desc:'Blue with the state coat of arms: a moose beneath a pine tree, flanked by a farmer and a sailor, with the Latin motto Dirigo — I Lead.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Maine'},
  {name:'Maryland (US State)',img:'https://flagcdn.com/w320/us-md.png',blur:false,desc:'Quartered with the Calvert and Crossland family coats of arms — alternating black-and-gold stripes with a red-and-white cross. The only US state flag based entirely on heraldic family colours.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Maryland'},
  {name:'Massachusetts (US State)',img:'https://flagcdn.com/w320/us-ma.png',blur:false,desc:'White with a Native American holding a bow and arrow before a blue shield. The motto: By the Sword We Seek Peace, But Peace Only Under Liberty.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Massachusetts'},
  {name:'Michigan (US State)',img:'https://flagcdn.com/w320/us-mi.png',blur:false,desc:'Blue with the state coat of arms: an elk and moose supporting a shield before a sunrise. The shield bears Tuebor — I Will Defend.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Michigan'},
  {name:'Minnesota (US State)',img:'https://flagcdn.com/w320/us-mn.png',blur:true,desc:'Blue with the state seal featuring a farmer plowing near a waterfall, a Native American on horseback, and the state name in a ring around the image.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Minnesota'},
  {name:'Mississippi (US State)',img:'https://flagcdn.com/w320/us-ms.png',blur:false,desc:'Blue with the state seal and a magnolia — adopted in 2020 after retiring a design incorporating the Confederate battle flag, the last US state to do so.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Mississippi'},
  {name:'Missouri (US State)',img:'https://flagcdn.com/w320/us-mo.png',blur:true,desc:'Three red-white-blue horizontal stripes with the state coat of arms: two grizzly bears and 24 stars for order of statehood. The state name appears within.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Missouri'},
  {name:'Montana (US State)',img:'https://flagcdn.com/w320/us-mt.png',blur:true,desc:'Blue with the state seal depicting the Great Falls of the Missouri River. The Spanish motto Oro y Plata — Gold and Silver — and state name appear on the flag.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Montana'},
  {name:'Nebraska (US State)',img:'https://flagcdn.com/w320/us-ne.png',blur:true,desc:'Blue with the state seal in gold and silver: a blacksmith, settler\'s cabin, steamboat, and train. The state name appears below the seal.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Nebraska'},
  {name:'Nevada (US State)',img:'https://flagcdn.com/w320/us-nv.png',blur:true,desc:'Cobalt blue with a silver star, sagebrush sprigs, and the words \'Battle Born\' — referencing Nevada achieving statehood during the Civil War in 1864.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Nevada'},
  {name:'New Hampshire (US State)',img:'https://flagcdn.com/w320/us-nh.png',blur:false,desc:'Blue with the state seal: the frigate USS Raleigh surrounded by a laurel wreath and nine stars for being the 9th state to ratify the Constitution.',wiki:'https://en.wikipedia.org/wiki/Flag_of_New_Hampshire'},
  {name:'New Jersey (US State)',img:'https://flagcdn.com/w320/us-nj.png',blur:false,desc:'A distinctive buff (yellow) field chosen by George Washington for New Jersey troops, bearing the state coat of arms with a horse\'s head and the goddesses Liberty and Ceres.',wiki:'https://en.wikipedia.org/wiki/Flag_of_New_Jersey'},
  {name:'New Mexico (US State)',img:'https://flagcdn.com/w320/us-nm.png',blur:false,desc:'Yellow with a red Zia sun symbol — a circle with four groups of four rays. The Zia Pueblo consider this sacred; the four-fold symmetry represents the four directions, seasons, periods of day, and stages of life.',wiki:'https://en.wikipedia.org/wiki/Flag_of_New_Mexico'},
  {name:'New York (US State)',img:'https://flagcdn.com/w320/us-ny.png',blur:false,desc:'Blue with the state coat of arms: the sun rising over the Hudson Highlands, flanked by Liberty and Justice, with a bald eagle atop a globe and the motto Excelsior — Ever Upward.',wiki:'https://en.wikipedia.org/wiki/Flag_of_New_York'},
  {name:'North Carolina (US State)',img:'https://flagcdn.com/w320/us-nc.png',blur:false,desc:'A vertical blue bar with N and C flanking a gold star, then red and white horizontal stripes. Two dates reference early declarations of independence from British rule.',wiki:'https://en.wikipedia.org/wiki/Flag_of_North_Carolina'},
  {name:'North Dakota (US State)',img:'https://flagcdn.com/w320/us-nd.png',blur:false,desc:'Blue with a bald eagle bearing the motto E Pluribus Unum — nearly identical to the US military eagle flag of 1861. Often cited as one of the hardest US state flags to distinguish.',wiki:'https://en.wikipedia.org/wiki/Flag_of_North_Dakota'},
  {name:'Ohio (US State)',img:'https://flagcdn.com/w320/us-oh.png',blur:false,desc:'The only non-rectangular US state flag — a swallowtail burgee with red and white stripes, a blue triangle, and a white O encircling a red disc for the Buckeye State.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Ohio'},
  {name:'Oklahoma (US State)',img:'https://flagcdn.com/w320/us-ok.png',blur:true,desc:'Blue with an Osage buckskin war shield decorated with eagle feathers, crossed by an olive branch and peace pipe. The state name was added below the design in 1941.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Oklahoma'},
  {name:'Oregon (US State)',img:'https://flagcdn.com/w320/us-or.png',blur:true,desc:'The only US state flag with different designs on each side: the front shows the state seal with gold text, the reverse features a beaver. The state name appears on the front.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Oregon'},
  {name:'Pennsylvania (US State)',img:'https://flagcdn.com/w320/us-pa.png',blur:false,desc:'Blue with the state coat of arms: a ship, plough, and wheat sheaves on a shield supported by two black horses, with a bald eagle above and the motto Virtue Liberty and Independence.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Pennsylvania'},
  {name:'Rhode Island (US State)',img:'https://flagcdn.com/w320/us-ri.png',blur:false,desc:'White with a golden anchor surrounded by thirteen gold stars and the word HOPE — one of the oldest state mottos. The last of the original 13 colonies to ratify the Constitution.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Rhode_Island'},
  {name:'South Carolina (US State)',img:'https://flagcdn.com/w320/us-sc.png',blur:false,desc:'Blue with a white crescent moon in the upper left and a white palmetto tree. Both symbols played key roles during the American Revolution at Fort Moultrie.',wiki:'https://en.wikipedia.org/wiki/Flag_of_South_Carolina'},
  {name:'South Dakota (US State)',img:'https://flagcdn.com/w320/us-sd.png',blur:true,desc:'Blue with a gold sun, the state motto Under God the People Rule, and the state nickname in a ring around a central scene of South Dakota life.',wiki:'https://en.wikipedia.org/wiki/Flag_of_South_Dakota'},
  {name:'Tennessee (US State)',img:'https://flagcdn.com/w320/us-tn.png',blur:false,desc:'Red with a blue circle bearing three white stars representing the state\'s three major geographic regions: East, Middle, and West Tennessee.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Tennessee'},
  {name:'Texas (US State)',img:'https://flagcdn.com/w320/us-tx.png',blur:false,desc:'The Lone Star Flag — a vertical blue stripe with a white star, and horizontal white and red stripes. Texas was an independent republic before joining the United States in 1845.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Texas'},
  {name:'Utah (US State)',img:'https://flagcdn.com/w320/us-ut.png',blur:false,desc:'Blue with the state seal: a beehive symbolising industry, flanked by sego lilies, with a bald eagle and the date 1847 when Mormon pioneers arrived in the Salt Lake Valley.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Utah'},
  {name:'Vermont (US State)',img:'https://flagcdn.com/w320/us-vt.png',blur:true,desc:'Blue with the state coat of arms: a Vermont landscape with pine tree, cow, and wheat sheaves. The state name and motto Freedom and Unity appear on the flag.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Vermont'},
  {name:'Virginia (US State)',img:'https://flagcdn.com/w320/us-va.png',blur:true,desc:'Blue with the Roman goddess Virtus standing over a defeated tyrant. The motto Sic Semper Tyrannis — Thus Always to Tyrants — was famously shouted at Lincoln\'s assassination.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Virginia'},
  {name:'Washington (US State)',img:'https://flagcdn.com/w320/us-wa.png',blur:true,desc:'The only US state flag with a green background, featuring the portrait of George Washington — the only US state flag depicting an actual historical person.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Washington_(state)'},
  {name:'West Virginia (US State)',img:'https://flagcdn.com/w320/us-wv.png',blur:false,desc:'White with the state coat of arms: a boulder inscribed with the statehood date, a farmer and miner, crossed rifles, and a red cap of liberty. Broke away from Virginia during the Civil War.',wiki:'https://en.wikipedia.org/wiki/Flag_of_West_Virginia'},
  {name:'Wisconsin (US State)',img:'https://flagcdn.com/w320/us-wi.png',blur:true,desc:'Blue with the state coat of arms, the state name in white above, and the year 1848 below. The shield depicts a sailor, miner, plough, arm and hammer, and a badger — the state animal.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Wisconsin'},
  {name:'Wyoming (US State)',img:'https://flagcdn.com/w320/us-wy.png',blur:false,desc:'The state seal on a white bison silhouette on blue, with red and white borders. Placing the seal on a bison\'s side is unique among all US state flags.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Wyoming'},
  {name:'Alberta (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-AB.png',blur:false,desc:'Blue with the provincial shield: the Cross of St George above a landscape of prairie, foothills, and mountains. Alberta produces the majority of Canada\'s oil and gas and has no provincial sales tax.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Alberta'},
  {name:'British Columbia (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-BC.png',blur:false,desc:'The Union Jack with a golden crown above, and a setting sun over blue and white wavy lines below representing the Pacific Ocean. BC is Canada\'s westernmost province.',wiki:'https://en.wikipedia.org/wiki/Flag_of_British_Columbia'},
  {name:'Manitoba (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-MB.png',blur:false,desc:'A red ensign with the Union Jack and the provincial shield — a Cross of St George with a bison on green grass. Known as the Keystone Province at the geographical heart of Canada.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Manitoba'},
  {name:'New Brunswick (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-NB.png',blur:false,desc:'A golden lion on red in the upper half and a golden galley on wavy blue-white stripes below — derived from the Brunswick coat of arms brought by Loyalists after the American Revolution.',wiki:'https://en.wikipedia.org/wiki/Flag_of_New_Brunswick'},
  {name:'Newfoundland and Labrador (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-NL.png',blur:false,desc:'A blue, white, and red geometric design by artist Christopher Pratt, adopted in 1980. The golden arrow points to the future; red represents the sacrifice of the past.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Newfoundland_and_Labrador'},
  {name:'Nova Scotia (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-NS.png',blur:false,desc:'A blue diagonal cross (St Andrew\'s Saltire) on white, with a golden lion on red in the centre — effectively the Scottish flag with the Scottish royal lion superimposed. Nova Scotia means New Scotland.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Nova_Scotia'},
  {name:'Ontario (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-ON.png',blur:false,desc:'A red ensign with the Union Jack and the provincial shield — a red Cross of St George with three golden maple leaves on green. Ontario is Canada\'s most populous province.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Ontario'},
  {name:'Prince Edward Island (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-PE.png',blur:false,desc:'The British golden lion in the upper third on red; in the lower two-thirds, a green island with a large oak tree and three saplings representing the island\'s three counties.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Prince_Edward_Island'},
  {name:'Quebec (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-QC.png',blur:false,desc:'Blue and white divided by a white cross with a white fleur-de-lis in each blue quadrant — the Fleurdelise. Adopted in 1948, it reflects Quebec\'s distinct French heritage.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Quebec'},
  {name:'Saskatchewan (Canadian Province)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-SK.png',blur:false,desc:'Green (top) and yellow (bottom) halves with the provincial shield in the upper left and a western red lily in the fly. Green represents forests; yellow the vast prairie grain fields.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Saskatchewan'},
  {name:'Northwest Territories (Canadian Territory)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-NT.png',blur:false,desc:'Blue vertical stripes flanking a white centre with the territorial shield. Features the aurora borealis, a fox, and a wavy line representing the Northwest Passage.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Northwest_Territories'},
  {name:'Nunavut (Canadian Territory)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-NU.png',blur:false,desc:'Blue and gold vertical halves with an inuksuk in red and the North Star in blue. Nunavut became Canada\'s newest and largest territory in 1999 with an Inuit majority population.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Nunavut'},
  {name:'Yukon (Canadian Territory)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/CA-YT.png',blur:false,desc:'Green, white, and blue vertical stripes with the territorial coat of arms featuring a malamute dog. The Yukon is home to Canada\'s highest peak, Mount Logan at 5,959 metres.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Yukon'},
  {name:'New South Wales (Australian State)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-NSW.png',blur:false,desc:'A blue ensign with a red Cross of St George bearing a golden lion on each arm and an eight-pointed star in the centre. Australia\'s oldest and most populous state.',wiki:'https://en.wikipedia.org/wiki/Flag_of_New_South_Wales'},
  {name:'Victoria (Australian State)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-VIC.png',blur:false,desc:'A blue ensign with the Southern Cross distinguished by a royal crown above the five stars — unlike other Australian state flags. Victoria is Australia\'s most densely populated state.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Victoria_(Australia)'},
  {name:'Queensland (Australian State)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-QLD.png',blur:false,desc:'A blue ensign with a Maltese Cross bearing a royal crown on a white disc. Australia\'s second-largest state, nicknamed the Sunshine State, and home to the Great Barrier Reef.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Queensland'},
  {name:'South Australia (Australian State)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-SA.png',blur:false,desc:'A blue ensign with a golden piping shrike with spread wings on a yellow disc. The first Australian colony to grant women the right to vote and stand for parliament, in 1894.',wiki:'https://en.wikipedia.org/wiki/Flag_of_South_Australia'},
  {name:'Western Australia (Australian State)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-WA.png',blur:false,desc:'A blue ensign with a black swan on a gold disc. The black swan is endemic to the region. The largest Australian state, covering about one-third of the continent.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Western_Australia'},
  {name:'Tasmania (Australian State)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-TAS.png',blur:false,desc:'A blue ensign with a red lion on a white disc — the same heraldic red lion as on the flag of England. Australia\'s only island state, separated from the mainland by the Bass Strait.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Tasmania'},
  {name:'Northern Territory (Australian Territory)',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-NT.png',blur:false,desc:'A black and ochre vertical bicolour with Sturt\'s desert rose on the black half and the Southern Cross on ochre. Covers 17% of Australia\'s land but less than 1% of its population.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Northern_Territory'},
  {name:'Australian Capital Territory',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/AU-ACT.png',blur:false,desc:'Horizontal blue and gold halves with the Southern Cross on the blue and the ACT coat of arms on the gold. Contains Canberra, built as a compromise capital between Sydney and Melbourne.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Australian_Capital_Territory'},
  {name:'United Nations',img:'https://raw.githubusercontent.com/lipis/flag-icons/main/flags/4x3/un.svg',blur:false,desc:'A world map centred on the North Pole, flanked by olive branches on light blue. Light blue was chosen as the opposite of red, symbolising peace. Founded in 1945 with 51 members; now 193.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_United_Nations'},
  {name:'European Union',img:'https://raw.githubusercontent.com/lipis/flag-icons/main/flags/4x3/eu.svg',blur:false,desc:'Twelve golden stars in a circle on blue, representing unity and harmony. The number twelve is symbolic — it has no relation to the number of member states.',wiki:'https://en.wikipedia.org/wiki/European_flag'},
  {name:'NATO',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/320px-Flag_of_NATO.svg.png',blur:false,desc:'A dark blue compass rose with four white lines, symbolising peaceful agreement. Founded in 1949 with 12 members; now 32 member states.',wiki:'https://en.wikipedia.org/wiki/Flag_of_NATO'},
  {name:'Olympic Games',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Olympic_flag.svg/320px-Olympic_flag.svg.png',blur:false,desc:'Five interlocking rings in blue, yellow, black, green, and red on white. Designed in 1912; the colours appear on every flag of the nations that competed in the 1912 Stockholm Olympics.',wiki:'https://en.wikipedia.org/wiki/Olympic_flag'},
  {name:'Red Cross',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Flag_of_the_Red_Cross.svg/320px-Flag_of_the_Red_Cross.svg.png',blur:false,desc:'A red cross on white — the reverse of the Swiss flag, honouring Switzerland where the ICRC was founded in 1863. The Red Crescent is the equivalent symbol in Muslim-majority countries.',wiki:'https://en.wikipedia.org/wiki/Emblem_of_the_Red_Cross'},
  {name:'ASEAN',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Flag_of_ASEAN.svg/320px-Flag_of_ASEAN.svg.png',blur:false,desc:'A blue flag with a red circle containing ten bound yellow rice stalks representing the ten member nations. The Association of Southeast Asian Nations was founded in Bangkok in 1967.',wiki:'https://en.wikipedia.org/wiki/Flag_of_ASEAN'},
  {name:'African Union',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Flag_of_the_African_Union.svg/320px-Flag_of_the_African_Union.svg.png',blur:false,desc:'A green map of Africa on a white sun with alternating rays, ringed by 55 gold stars — one per member state. Founded in 2002 as successor to the Organisation of African Unity.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_African_Union'},
  {name:'Commonwealth of Nations',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Flag_of_the_Commonwealth_of_Nations.svg/320px-Flag_of_the_Commonwealth_of_Nations.svg.png',blur:false,desc:'A blue field with a golden globe and the letter C at compass points. Links 56 nations — most with historical ties to Britain — representing about 2.5 billion people.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Commonwealth_of_Nations'},
  {name:'Confederate States (Historical)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Confederate_Rebel_Flag.svg/320px-Confederate_Rebel_Flag.svg.png',blur:false,desc:'The Confederate battle flag — a blue saltire with white stars on red. Never the official national flag; it was the Army of Northern Virginia\'s battle flag (1861-1865).',wiki:'https://en.wikipedia.org/wiki/Confederate_battle_flag'},
  {name:'Soviet Union (Historical)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/320px-Flag_of_the_Soviet_Union.svg.png',blur:false,desc:'A red flag with a golden hammer and sickle beneath a gold star. The hammer represents industrial workers, the sickle agricultural workers. Used from 1922 until the USSR\'s dissolution in December 1991.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Soviet_Union'},
  {name:'East Germany (Historical)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Flag_of_East_Germany.svg/320px-Flag_of_East_Germany.svg.png',blur:false,desc:'Black, red, and gold stripes identical to West Germany but with a state emblem — a hammer and compass in a rye wreath — in the centre. The GDR existed from 1949 until reunification on 3 October 1990.',wiki:'https://en.wikipedia.org/wiki/Flag_of_East_Germany'},
  {name:'Ottoman Empire (Historical)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Flag_of_the_Ottoman_Empire.svg/320px-Flag_of_the_Ottoman_Empire.svg.png',blur:false,desc:'A red flag with a white crescent and star. The empire lasted from 1299 to 1922 and at its peak spanned three continents. Its crescent and star influenced flags of many modern Muslim-majority nations.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Ottoman_Empire'},
  {name:'British East India Company (Historical)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Flag_of_the_British_East_India_Company_(1801).svg/320px-Flag_of_the_British_East_India_Company_(1801).svg.png',blur:false,desc:'A red and white striped flag with the Union Jack in the canton — the design may have influenced the American flag. The Company governed much of India from 1757 until the Crown took over after the 1857 uprising.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_British_East_India_Company'},
  {name:'Qing Dynasty (Historical)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Yellow_Dragon_Flag.svg/320px-Yellow_Dragon_Flag.svg.png',blur:false,desc:'A yellow triangular flag bearing a blue dragon — the imperial standard of China\'s last dynasty (1889-1912). The Qing ruled from 1644 until the 1911 Revolution, producing the Forbidden City as it stands today.',wiki:'https://en.wikipedia.org/wiki/Flag_of_the_Qing_dynasty'},
  {name:'Jolly Roger (Blackbeard)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Blackbeard_Flag.svg/320px-Blackbeard_Flag.svg.png',blur:false,desc:'A skeleton holding an hourglass and a spear piercing a bleeding heart, toasting a devil. The personal flag of Edward Teach — active 1716-1718 before being killed by British naval forces.',wiki:'https://en.wikipedia.org/wiki/Jolly_Roger'},
  {name:'Calico Jack (Pirate)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Calico_Jack_Flag.svg/320px-Calico_Jack_Flag.svg.png',blur:false,desc:'A skull above two crossed swords on black. This pirate\'s crew famously included two women, Anne Bonny and Mary Read. He was captured and hanged in Jamaica in 1720.',wiki:'https://en.wikipedia.org/wiki/Calico_Jack'},
  {name:'White Ensign (Royal Navy)',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/White_Ensign.svg/320px-White_Ensign.svg.png',blur:false,desc:'A white flag with the red Cross of St George and the Union Jack in the canton. Flown by all commissioned Royal Navy warships — one of the world\'s most recognised naval flags.',wiki:'https://en.wikipedia.org/wiki/White_Ensign'},
  {name:'International Maritime Signal — Flag A',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/ICS_Alfa.svg/320px-ICS_Alfa.svg.png',blur:false,desc:'A white and blue swallowtail pennant meaning \'I have a diver down; keep well clear at slow speed.\' Part of the International Code of Signals used by vessels worldwide.',wiki:'https://en.wikipedia.org/wiki/International_Code_of_Signals'},
  {name:'Wales',img:'https://raw.githubusercontent.com/google/region-flags/gh-pages/png/GB-WLS.png',blur:false,desc:'A red dragon on green and white horizontal bands — Y Ddraig Goch. One of the world\'s oldest national flags, associated with Wales since at least the 9th century.',wiki:'https://en.wikipedia.org/wiki/Flag_of_Wales'},

let flagState = { score: 0, total: 0, seenFlags: new Set() };
let flagHardState = { score: 0, total: 0, seenFlags: new Set() };
let _currentFlagDifficulty = 'easy';
let _currentFlagInput = 'multi';

function flagUrl(code) {
  return `https://flagcdn.com/w320/${code}.png`;
}

function codeToEmoji(code) {
  if (!code || code.length < 2) return '🏳️';
  const c = code.toLowerCase();
  return String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 97) +
         String.fromCodePoint(0x1F1E6 + c.charCodeAt(1) - 97);
}

function startFlagGame(difficulty, inputMode) {
  difficulty = difficulty || 'easy';
  inputMode  = inputMode  || 'multi';
  _currentFlagDifficulty = difficulty;
  _currentFlagInput = inputMode;
  stopSpeech();
  appMode = 'play';
  updateToggleBar();
  renderFlagRound();
}

function renderFlagRound() {
  const isHard  = _currentFlagDifficulty === 'hard';
  const isTyped = _currentFlagInput === 'type';

  if (isHard) {
    const seen = flagHardState.seenFlags;
    let pool = FLAG_HARD.filter(f => !seen.has(f.name));
    if (pool.length < 4) { seen.clear(); pool = [...FLAG_HARD]; }
    const correct = pool[Math.floor(Math.random() * pool.length)];
    seen.add(correct.name);

    const others = FLAG_HARD.filter(f => f.name !== correct.name).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = shuffle([correct, ...others]);

    const modeLabel = isTyped ? '💀 Type the name of this flag' : '💀 Hard mode — what is this flag?';
    const blurClass = correct.blur ? 'blurred' : '';
    const blurHint  = correct.blur ? '<div class="flag-blur-hint" onclick="document.querySelector(\'.flag-img\').classList.remove(\'blurred\');this.remove()">⚠ Name visible on flag — tap to reveal</div>' : '';

    if (isTyped) {
      document.getElementById('cardArea').innerHTML = `
        <div class="flag-card" id="flagCard">
          <div class="flag-display">
            <span class="flag-game-label">${modeLabel}</span>
            <img class="flag-img ${blurClass}" src="${correct.img}" alt="Flag" onerror="this.outerHTML='<div class=\'flag-load-err\'>🖼 Image loading…<br><small>Works on deployed version</small></div>'">
            ${blurHint}
          </div>
          <div class="flag-type-form">
            <input class="flag-type-input" id="flagTypeInput" type="text" placeholder="Type your answer…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')submitFlagType()">
            <button class="flag-type-submit" onclick="submitFlagType()">Submit</button>
          </div>
          <div class="flag-type-hint" id="flagTypeHint">Press Enter or tap Submit</div>
          <div id="flagReveal"></div>
          <div class="flag-score">Score: ${flagHardState.score} / ${flagHardState.total}</div>
        </div>
        <div class="nav-controls" style="margin-top:16px">
          <button class="btn-next" id="flagNextBtn" onclick="renderFlagRound()" style="flex:1;display:none">Next flag →</button>
          <button class="btn-next" onclick="setDomain('random')" style="flex:0;padding:14px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);">✕</button>
        </div>`;
      setTimeout(() => document.getElementById('flagTypeInput')?.focus(), 100);
    } else {
      document.getElementById('cardArea').innerHTML = `
        <div class="flag-card" id="flagCard">
          <div class="flag-display">
            <span class="flag-game-label">${modeLabel}</span>
            <img class="flag-img ${blurClass}" id="hardFlagImg" src="${correct.img}" alt="Flag" onerror="this.outerHTML='<div class=\'flag-load-err\'>🖼 Image loading…<br><small>Works on deployed version</small></div>'">
            ${blurHint}
          </div>
          <div class="flag-options">
            ${options.map((o, i) => `
              <button class="flag-option" data-idx="${i}" onclick="answerFlagHard(this.dataset.idx)">
                ${escHtml(o.name)}
              </button>`).join('')}
          </div>
          <div id="flagReveal"></div>
          <div class="flag-score">Score: ${flagHardState.score} / ${flagHardState.total}</div>
        </div>
        <div class="nav-controls" style="margin-top:16px">
          <button class="btn-next" id="flagNextBtn" onclick="renderFlagRound()" style="flex:1;display:none">Next flag →</button>
          <button class="btn-next" onclick="setDomain('random')" style="flex:0;padding:14px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);">✕</button>
        </div>`;
    }
    window._hardFlagCorrect = correct;
    window._hardFlagOptions = options;

  } else {
    // Easy mode — country flags
    const seen = flagState.seenFlags;
    let pool = FLAG_COUNTRIES.filter(c => !seen.has(c.code));
    if (pool.length < 4) { seen.clear(); pool = [...FLAG_COUNTRIES]; }
    const correct = pool[Math.floor(Math.random() * pool.length)];
    seen.add(correct.code);

    const others = FLAG_COUNTRIES.filter(c => c.code !== correct.code).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = shuffle([correct, ...others]);

    if (isTyped) {
      document.getElementById('cardArea').innerHTML = `
        <div class="flag-card">
          <div class="flag-display">
            <span class="flag-game-label">🚩 Type the country name</span>
            <div class="flag-emoji-display" id="easyFlagEmoji">${codeToEmoji(correct.code)}</div>
          </div>
          <div class="flag-type-form">
            <input class="flag-type-input" id="flagTypeInput" type="text" placeholder="Country name…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')submitFlagTypeEasy('${correct.code}','${escAttr(correct.name)}')">
            <button class="flag-type-submit" onclick="submitFlagTypeEasy('${correct.code}','${escAttr(correct.name)}')">Submit</button>
          </div>
          <div class="flag-type-hint" id="flagTypeHint">Press Enter or tap Submit</div>
          <div id="flagEasyReveal"></div>
          <div class="flag-score">Score: ${flagState.score} / ${flagState.total}</div>

          <button class="btn-next" id="flagNextBtn" onclick="renderFlagRound()" style="flex:1;display:none">Next flag →</button>
          <button class="btn-next" onclick="setDomain('random')" style="flex:0;padding:14px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);">✕</button>
        </div>`;
      setTimeout(() => document.getElementById('flagTypeInput')?.focus(), 100);
    } else {
      document.getElementById('cardArea').innerHTML = `
        <div class="flag-card">
          <div class="flag-display">
            <span class="flag-game-label">🚩 Which country is this flag?</span>
            <div class="flag-emoji-display" id="easyFlagEmoji">${codeToEmoji(correct.code)}</div>
          </div>
          <div class="flag-options">
            ${options.map(o => `
              <button class="flag-option" onclick="answerFlag('${o.code}','${correct.code}',this)">
                ${escHtml(o.name)}
              </button>`).join('')}
          </div>
          <div class="flag-score">Score: ${flagState.score} / ${flagState.total}</div>
        </div>
        <div class="nav-controls" style="margin-top:16px">
          <button class="btn-next" id="flagNextBtn" onclick="renderFlagRound()" style="flex:1;display:none">Next flag →</button>
          <button class="btn-next" onclick="setDomain('random')" style="flex:0;padding:14px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);">✕</button>
        </div>`;
    }
  }

  document.getElementById('statsStrip').style.display = 'none';
  document.getElementById('milestoneArea').innerHTML = '';
}

function answerFlag(chosen, correct, btn) {
  document.querySelectorAll('.flag-option').forEach(b => b.disabled = true);
  flagState.total++;
  if (chosen === correct) {
    flagState.score++;
    btn.classList.add('correct');
    showToast('✓ Correct!');
  } else {
    btn.classList.add('wrong');
    const correctCountry = FLAG_COUNTRIES.find(c => c.code === correct);
    document.querySelectorAll('.flag-option').forEach(b => {
      if (b.textContent.trim() === correctCountry?.name) b.classList.add('correct');
    });
    showToast('✗ Wrong');
  }
  document.querySelector('.flag-score').textContent = `Score: ${flagState.score} / ${flagState.total}`;
  const nextBtn = document.getElementById('flagNextBtn');
  if (nextBtn) { nextBtn.style.display = 'flex'; }
}

function answerFlagHard(idx) {
  const btn = document.querySelector(`.flag-option[data-idx="${idx}"]`);
  if (!btn || btn.disabled) return;
  document.querySelectorAll('.flag-option').forEach(b => b.disabled = true);
  flagHardState.total++;
  const correct = window._hardFlagCorrect;
  const chosen  = window._hardFlagOptions[parseInt(idx)];

  if (chosen.name === correct.name) {
    flagHardState.score++;
    btn.classList.add('correct');
    showToast('✓ Correct!');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.flag-option').forEach(b => {
      if (window._hardFlagOptions[parseInt(b.dataset.idx)]?.name === correct.name) b.classList.add('correct');
    });
    showToast('✗ Wrong');
  }

  document.getElementById('flagReveal').innerHTML = `
    <div class="flag-reveal">
      <div class="flag-reveal-title">${escHtml(correct.name)}</div>
      <div class="flag-reveal-desc">${escHtml(scrubFlagName(correct.desc, correct.name))}</div>
      <a class="flag-wiki-link" href="${correct.wiki}" target="_blank" rel="noopener">Read more on Wikipedia ↗</a>
    </div>`;

  // Unblur the flag image now that the answer is revealed
  const flagImg = document.getElementById('hardFlagImg');
  if (flagImg) { flagImg.classList.remove('blurred'); document.querySelector('.flag-blur-hint')?.remove(); }

  document.querySelector('.flag-score').textContent = `Score: ${flagHardState.score} / ${flagHardState.total}`;
  const nextBtn = document.getElementById('flagNextBtn');
  if (nextBtn) nextBtn.style.display = 'flex';
}

function submitFlagType() {
  // Hard mode typed
  const input = document.getElementById('flagTypeInput');
  const hint  = document.getElementById('flagTypeHint');
  const next  = document.getElementById('flagNextBtn');
  if (!input || input.disabled) return;
  const val = input.value.trim();
  if (!val) return;

  const correct = window._hardFlagCorrect;
  const isRight = flagTypedMatch(val, correct.name);

  input.disabled = true;
  flagHardState.total++;

  if (isRight) {
    flagHardState.score++;
    input.classList.add('correct');
    hint.textContent = '✓ Correct!';
    hint.style.color = 'var(--accent2)';
    showToast('✓ Correct!');
  } else {
    input.classList.add('wrong');
    hint.textContent = `✗ The answer was: ${correct.name}`;
    hint.style.color = 'var(--accent)';
    showToast('✗ Wrong');
  }

  // Show description + wiki
  document.getElementById('flagReveal').innerHTML = `
    <div class="flag-reveal">
      <div class="flag-reveal-title">${escHtml(correct.name)}</div>
      <div class="flag-reveal-desc">${escHtml(scrubFlagName(correct.desc, correct.name))}</div>
      <a class="flag-wiki-link" href="${correct.wiki}" target="_blank" rel="noopener">Read more on Wikipedia ↗</a>
    </div>`;

  // Unblur the flag image now that the answer is revealed
  document.querySelector('.flag-img')?.classList.remove('blurred');
  document.querySelector('.flag-blur-hint')?.remove();

  document.querySelector('.flag-score').textContent = `Score: ${flagHardState.score} / ${flagHardState.total}`;
  if (next) next.style.display = 'flex';
}

function submitFlagTypeEasy(correctCode, correctName) {
  const input = document.getElementById('flagTypeInput');
  const hint  = document.getElementById('flagTypeHint');
  const next  = document.getElementById('flagNextBtn');
  if (!input || input.disabled) return;
  const val = input.value.trim();
  if (!val) return;

  const isRight = flagTypedMatch(val, correctName);

  input.disabled = true;
  flagState.total++;

  if (isRight) {
    flagState.score++;
    input.classList.add('correct');
    hint.textContent = '✓ Correct!';
    hint.style.color = 'var(--accent2)';
    showToast('✓ Correct!');
  } else {
    input.classList.add('wrong');
    hint.textContent = `✗ The answer was: ${correctName}`;
    hint.style.color = 'var(--accent)';
    showToast('✗ Wrong');
  }

  document.querySelector('.flag-score').textContent = `Score: ${flagState.score} / ${flagState.total}`;
  if (next) next.style.display = 'flex';
}
